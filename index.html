*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --A:#C27A1A;--AL:#FEF3E2;--AM:#F5C469;--AD:#7A4A08;--AX:#4A2C04;
  --T:#1D9E75;--TL:#E1F5EE;--TM:#9FE1CB;--TD:#085041;
  --CL:#FAECE7;--CD:#993C1D;
  --GL:#EAF3DE;--GD:#27500A;
  --PL:#EEEDFE;--PD:#3C3489;
  --c-sha:#7A4A08;--c-sha-bg:#FEF0D8;--c-sha-bd:#D4932A;
  --c-dra:#6B5500;--c-dra-bg:#FFFBD0;--c-dra-bd:#D4B800;
  --c-qmh:#5C3D1E;--c-qmh-bg:#F5ECD8;--c-qmh-bd:#C09050;
  --bg:#FFFDF8;--bg2:#F5ECD8;--bg3:#EDE0C4;
  --br:#E0CFA8;--br2:#C8B080;
  --tx:#2A1A06;--tx2:#7A5830;--tx3:#A88050;
  --r:14px;--rl:18px;
  --sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px)
}
[data-theme="light"]{
  --A:#C27A1A;--AL:#FEF3E2;--AM:#F5C469;--AD:#7A4A08;--AX:#4A2C04;
  --c-sha:#7A4A08;--c-sha-bg:#FEF0D8;--c-sha-bd:#D4932A;
  --c-dra:#6B5500;--c-dra-bg:#FFFBD0;--c-dra-bd:#D4B800;
  --c-qmh:#5C3D1E;--c-qmh-bg:#F5ECD8;--c-qmh-bd:#C09050;
  --bg:#FFFDF8;--bg2:#F5ECD8;--bg3:#EDE0C4;
  --br:#E0CFA8;--br2:#C8B080;
  --tx:#2A1A06;--tx2:#7A5830;--tx3:#A88050
}
[data-theme="dark"]{
  --bg:#1E1608;--bg2:#2A1E0A;--bg3:#352610;--br:#4A3418;--br2:#6A4C22;
  --tx:#F5E8CC;--tx2:#C4A06A;--tx3:#8A6840;
  --AL:#2a1c08;--AM:#7a4e10;--AD:#F5C469;--AX:#FEF3E2;
  --TL:#0a2018;--TM:#0f4a30;--TD:#9FE1CB;
  --CL:#2a1208;--CD:#F0997B;--GL:#111f08;--GD:#C0DD97;
  --c-sha:#F5C469;--c-sha-bg:#2a1c08;--c-sha-bd:#8a5018;
  --c-dra:#E8D500;--c-dra-bg:#221f00;--c-dra-bd:#6a5a00;
  --c-qmh:#DCAD80;--c-qmh-bg:#1e1208;--c-qmh-bd:#7a5030
}
/* ─── PIN SCREEN ─── */
#pin-screen{position:fixed;inset:0;z-index:500;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center}
.pin-title{font-size:24px;font-weight:900;color:var(--A);margin-bottom:6px}
.pin-sub{font-size:15px;color:var(--tx2);margin-bottom:28px}
.pin-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;max-width:320px;margin-bottom:20px}
.pin-role-btn{padding:22px 16px;border-radius:var(--rl);border:3px solid var(--br2);background:var(--bg2);cursor:pointer;font-family:inherit;text-align:center;transition:all .15s}
.pin-role-btn:active{transform:scale(.97)}
.pin-role-btn.manager{border-color:var(--A)}
.pin-role-btn-icon{font-size:36px;margin-bottom:8px}
.pin-role-btn-name{font-size:17px;font-weight:800;color:var(--tx)}
.pin-role-btn-sub{font-size:13px;color:var(--tx2);margin-top:3px}
.pin-dots{display:flex;justify-content:center;gap:14px;margin:20px 0}
.pin-dot{width:18px;height:18px;border-radius:50%;background:var(--br2);transition:background .15s}
.pin-dot.filled{background:var(--A)}
.pin-numpad{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;width:100%;max-width:280px;margin:0 auto}
.pin-num{padding:18px;border-radius:var(--r);border:2px solid var(--br2);background:var(--bg2);font-size:22px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;text-align:center}
.pin-num:active{background:var(--AL);border-color:var(--A);transform:scale(.95)}
.driver-filter{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.driver-pill{padding:8px 16px;border-radius:20px;border:2px solid var(--br2);background:var(--bg2);color:var(--tx2);font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;font-family:inherit}
.driver-pill.on{background:var(--A);color:#fff;border-color:var(--A)}
.role-badge{font-size:11px;padding:3px 8px;border-radius:10px;font-weight:700;margin-right:4px;display:inline-block}
.role-badge.manager{background:var(--AL);color:var(--AD)}
.role-badge.driver{background:var(--TL);color:var(--TD)}
/* ─── SPLASH SCREEN ─── */
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap');

#splash{
  position:fixed;inset:0;z-index:999;
  background:linear-gradient(155deg,#7A3008 0%,#B86010 35%,#C27A1A 65%,#D4922A 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 28px;text-align:center;
  /* أبطأ قليلاً — fade-out بعد 3.2 ثانية */
  animation:splashOut .6s ease-out forwards 3.2s;
  /* طبقة خفيفة لإضفاء عمق */
  box-shadow:inset 0 -120px 200px rgba(0,0,0,.18),inset 0 40px 80px rgba(255,220,100,.12);
}
@keyframes splashOut{
  0%{opacity:1;transform:scale(1)}
  100%{opacity:0;transform:scale(1.04);pointer-events:none;visibility:hidden}
}

/* الأيقونة */
.splash-icon{
  font-size:96px;
  margin-bottom:22px;
  filter:drop-shadow(0 8px 24px rgba(0,0,0,.35)) drop-shadow(0 2px 6px rgba(0,0,0,.2));
  animation:iconIn .7s cubic-bezier(.34,1.56,.64,1) both;
  display:block;line-height:1
}
@keyframes iconIn{
  0%{transform:scale(.3) translateY(20px);opacity:0}
  100%{transform:scale(1) translateY(0);opacity:1}
}

/* العنوان */
.splash-title{
  font-family:'Cairo',sans-serif;
  font-size:34px;
  font-weight:900;
  color:#FFFFFF;
  letter-spacing:.5px;
  margin-bottom:14px;
  line-height:1.3;
  text-shadow:0 2px 12px rgba(0,0,0,.35),0 1px 3px rgba(0,0,0,.25);
  animation:titleIn .7s ease both .35s;
  opacity:0
}
@keyframes titleIn{
  0%{transform:translateY(18px);opacity:0}
  100%{transform:translateY(0);opacity:1}
}

/* الفاصل الذهبي */
.splash-divider{
  width:60px;height:3px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.7),transparent);
  border-radius:2px;
  margin:0 auto 18px;
  animation:titleIn .6s ease both .55s;
  opacity:0
}

/* النص التقديمي */
.splash-tagline{
  font-family:'Cairo',sans-serif;
  font-size:16px;
  font-weight:400;
  color:rgba(255,255,255,.9);
  line-height:1.75;
  max-width:300px;
  margin:0 auto 32px;
  text-shadow:0 1px 6px rgba(0,0,0,.25);
  animation:taglineIn .7s ease both .65s;
  opacity:0
}
@keyframes taglineIn{
  0%{transform:translateY(12px);opacity:0}
  100%{transform:translateY(0);opacity:.9}
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:'Cairo',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;color:var(--tx);font-size:17px;line-height:1.5}
#app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto}

/* ─── TOPBAR ─── */
.topbar{background:var(--A);padding:11px 16px 10px;padding-top:calc(11px + var(--st));flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.tb-logo{font-size:17px;font-weight:800;color:#fff;letter-spacing:-.3px;line-height:1.3}
.tb-sub{font-size:11px;color:rgba(255,255,255,.75);margin-top:2px}
.tb-ca-val{font-size:19px;font-weight:800;color:#fff;text-align:left}
.tb-ca-lbl{font-size:11px;color:rgba(255,255,255,.75);text-align:left}

/* ─── CONTENT + SCREENS ─── */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.screen{display:none;padding:14px 14px 24px;animation:fi .15s ease}
.screen.on{display:block}
@keyframes fi{from{opacity:.5;transform:translateY(3px)}to{opacity:1;transform:none}}

/* ─── NAV ─── */
.nav{background:var(--bg);border-top:2px solid var(--br);display:flex;flex-shrink:0;padding-bottom:var(--sb);position:relative;z-index:100}
.nb{flex:1;padding:10px 2px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:none;background:none;color:var(--tx3);font-size:10px;font-family:inherit;font-weight:700;transition:color .15s;position:relative;min-width:0}
.nb.on{color:var(--A)}
.nb.on::after{content:'';position:absolute;top:0;left:15%;right:15%;height:3px;background:var(--A);border-radius:0 0 3px 3px}
.nb svg{width:22px;height:22px;stroke-width:2}

/* ─── SECTION LABEL ─── */
.slbl{font-size:13px;color:var(--tx2);letter-spacing:.05em;margin:18px 0 10px;font-weight:700;text-transform:uppercase}

/* ─── CARDS ─── */
.card{background:var(--bg);border:1.5px solid var(--br);border-radius:var(--rl);padding:14px;margin-bottom:12px}
.card-flat{background:var(--bg2);border-radius:var(--r);padding:13px;margin-bottom:12px}

/* ─── METRIC GRID ─── */
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.met{background:var(--bg2);border-radius:var(--r);padding:12px 14px}
.met-lbl{font-size:13px;color:var(--tx2);margin-bottom:5px;font-weight:700}
.met-val{font-size:26px;font-weight:800;color:var(--tx);line-height:1}
.met-sub{font-size:12px;color:var(--tx2);margin-top:4px}

/* ─── FORMS ─── */
.fg{margin-bottom:14px}
.fl{font-size:15px;color:var(--tx2);margin-bottom:6px;display:block;font-weight:600}
input[type=text],input[type=number],input[type=time],select{
  width:100%;padding:13px 15px;border:1.5px solid var(--br2);border-radius:var(--r);
  background:var(--bg);color:var(--tx);font-size:17px;font-family:inherit;
  direction:rtl;-webkit-appearance:none;appearance:none;transition:border .15s
}
input:focus,select:focus{outline:none;border-color:var(--A);box-shadow:0 0 0 3px color-mix(in srgb,var(--A) 15%,transparent)}
input[type=number]{text-align:center;font-size:20px;font-weight:700}

/* ─── BUTTONS ─── */
.btn{width:100%;padding:15px;border-radius:var(--r);border:none;font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s,transform .1s;letter-spacing:.3px}
.btn:active{transform:scale(.97);opacity:.85}
.btn-p{background:var(--A);color:#fff}
.btn-s{background:var(--bg2);color:var(--tx);border:1.5px solid var(--br2)}
.btn-d{background:#FAECE7;color:#993C1D;border:1.5px solid #F0997B}
.btn-g{background:#1a73e8;color:#fff}
.btn-teal{background:var(--TL);color:var(--TD);border:1.5px solid var(--TM);font-size:18px}
.btn-sm{width:auto;padding:9px 18px;font-size:15px;border-radius:10px}

/* ─── MODE PILLS (تسليم / فائض) ─── */
.mode-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.mode-btn{padding:20px 10px;border-radius:var(--r);font-size:19px;font-weight:800;cursor:pointer;border:2.5px solid var(--br2);background:var(--bg2);color:var(--tx2);text-align:center;transition:all .18s;font-family:inherit;line-height:1.4}
.mode-btn.on{background:var(--A);color:#fff;border-color:var(--A);box-shadow:0 3px 12px color-mix(in srgb,var(--A) 35%,transparent)}

/* ─── BREAD TYPE CARDS — عمودي للوضوح الميداني ─── */
.tgrid{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.tcard{
  border-radius:var(--r);padding:0;border:3px solid;
  display:flex;flex-direction:row;align-items:center;
  gap:0;min-height:68px;overflow:hidden
}
.tcard-left{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 12px;min-width:80px;flex-shrink:0}
.tcard-sha .tcard-left{background:var(--c-sha-bg)}
.tcard-dra .tcard-left{background:var(--c-dra-bg)}
.tcard-qmh .tcard-left{background:var(--c-qmh-bg)}
.tcard-sha{background:var(--c-sha-bg);border-color:var(--c-sha-bd)}
.tcard-dra{background:var(--c-dra-bg);border-color:var(--c-dra-bd)}
.tcard-qmh{background:var(--c-qmh-bg);border-color:var(--c-qmh-bd)}
.tcard-icon{font-size:30px;line-height:1;margin-bottom:2px}
.tcard-nm{font-size:13px;font-weight:800;line-height:1.2;margin:0;text-align:center}
.tcard-nm-sha{color:var(--c-sha)}
.tcard-nm-dra{color:var(--c-dra)}
.tcard-nm-qmh{color:var(--c-qmh)}
.tcard-pr{font-size:11px;color:var(--tx2);margin:0}
.tcard-right{flex:1;display:flex;align-items:center;padding:8px 10px;background:#fff;gap:0}
.tcard-adj{display:flex;align-items:center;gap:6px;width:100%}
.tcard-adj-btn:active{transform:scale(.9)}
.tcard input{
  font-size:36px;font-weight:900;padding:6px 4px;border-radius:10px;
  flex:1;height:56px;-moz-appearance:textfield;appearance:textfield;
  border-width:2px;border-style:solid;text-align:center
}
.tcard input::-webkit-outer-spin-button,.tcard input::-webkit-inner-spin-button{-webkit-appearance:none}
.tcard-sha input{border-color:var(--c-sha-bd);background:#FFF8F0;color:#5A2D00}
.tcard-sha input::placeholder{color:#C89050;opacity:1}
.tcard-dra input{border-color:var(--c-dra-bd);background:#FFFDE8;color:#5A4500}
.tcard-dra input::placeholder{color:#B09000;opacity:1}
.tcard-qmh input{border-color:var(--c-qmh-bd);background:#FDF5E8;color:#3E2000}
.tcard-qmh input::placeholder{color:#9A7040;opacity:1}
/* أزرار +/- */
.tcard-adj-btn{
  width:44px;height:56px;border-radius:10px;border:2.5px solid;
  font-size:28px;font-weight:900;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-family:inherit;line-height:1;padding:0
}
.tcard-sha .tcard-adj-btn{background:#FEE8C0;border-color:var(--c-sha-bd);color:#5A2D00}
.tcard-dra .tcard-adj-btn{background:#FFF8C0;border-color:var(--c-dra-bd);color:#5A4500}
.tcard-qmh .tcard-adj-btn{background:#F5E8D0;border-color:var(--c-qmh-bd);color:#3E2000}
/* اسم النقطة المختارة — بارز فوق الأزرار */
.pt-selected-banner{
  background:var(--A);color:#fff;
  border-radius:var(--r);padding:12px 16px;
  margin-bottom:12px;
  display:flex;align-items:center;gap:10px
}
.pt-selected-banner-name{font-size:20px;font-weight:900;flex:1}
.pt-selected-banner-lbl{font-size:12px;opacity:.85}
/* زر التأكيد يلتصق بلوحة المفاتيح عبر JS */
.sticky-submit{
  position:fixed;
  left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;
  background:var(--bg);
  padding:10px 14px;
  border-top:1.5px solid var(--br);
  z-index:80; /* أقل من الـ nav */
  transition:bottom .1s ease;
  /* الموضع الافتراضي: فوق شريط التنقل مباشرة */
  bottom:calc(62px + var(--sb))
}
/* مساحة سفلية إضافية في الـ screen لتجنب تداخل الزر مع المحتوى */
#scr-deliv{padding-bottom:140px}

/* ─── DELIVERY ITEMS ─── */
.ditem{padding:11px 0;border-bottom:1.5px solid var(--br)}
.ditem:last-child{border-bottom:none}
.ditem-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.ditem-time{font-size:18px;font-weight:800;color:var(--A)}
.ditem-driver{font-size:13px;color:var(--tx2)}
.ditem-counts{display:flex;gap:6px;flex-wrap:wrap}
/* تسليم مُصفَّر أو مُلغى */
.ditem-zeroed{opacity:.55;background:var(--bg2);border-radius:var(--r);padding:8px 10px;margin:-4px 0}
.ditem-zeroed .ditem-time{color:var(--tx3)}
.zeroed-badge{font-size:12px;font-weight:700;color:var(--tx3);background:var(--bg3);border-radius:6px;padding:2px 8px;border:1px solid var(--br2)}
.dcount{display:flex;align-items:center;gap:4px;padding:5px 10px;border-radius:8px;font-size:15px;font-weight:700;border:1.5px solid}
.dcount-sha{background:var(--c-sha-bg);border-color:var(--c-sha-bd);color:var(--c-sha)}
.dcount-dra{background:var(--c-dra-bg);border-color:var(--c-dra-bd);color:var(--c-dra)}
.dcount-qmh{background:var(--c-qmh-bg);border-color:var(--c-qmh-bd);color:var(--c-qmh)}
.ditem-del{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:18px;padding:4px 8px;border-radius:8px}

/* ─── TOTALS BOX ─── */
.totals-box{background:var(--bg2);border-radius:var(--r);padding:13px 14px;margin-bottom:14px;border:1.5px solid var(--br)}
.totals-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--br)}
.totals-row:last-child{border-bottom:none;padding-top:10px;margin-top:4px;border-top:2px solid var(--br2)}
.totals-label{font-size:15px;font-weight:600;color:var(--tx2)}
.totals-count{font-size:22px;font-weight:800;color:var(--tx)}
.totals-val{font-size:15px;font-weight:600;color:var(--A)}
.totals-grand .totals-label{font-size:17px;font-weight:800;color:var(--tx)}
.totals-grand .totals-count{font-size:26px;color:var(--A)}
.totals-grand .totals-val{font-size:17px;font-weight:800}

/* ─── SUM BOX ─── */
.sum-box{background:var(--AL);border-radius:var(--r);padding:13px 15px;margin-bottom:14px;border:1px solid var(--AM)}
.sum-row{display:flex;justify-content:space-between;font-size:15px;padding:4px 0;color:var(--AD)}
.sum-total{font-size:18px;font-weight:800;border-top:2px solid var(--AM);margin-top:8px;padding-top:10px;color:var(--AX)}
/* ملخص موسّع — يظهر الفائض + مجموع اليوم */
.sum-section{border-top:1.5px dashed var(--AM);margin-top:10px;padding-top:10px}
.sum-section-title{font-size:12px;font-weight:700;color:var(--AD);letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px}
.sum-net{font-size:20px;font-weight:800;color:var(--T);display:flex;justify-content:space-between;padding:8px 12px;background:color-mix(in srgb,var(--T) 10%,transparent);border-radius:8px;margin-top:6px}
.sum-net-red{color:#D85A30!important;background:color-mix(in srgb,#D85A30 10%,transparent)!important}
/* شارة الاستعمال على أزرار النقاط */
.pt-btn-usage{position:absolute;top:8px;left:8px;font-size:11px;font-weight:700;background:var(--A);color:#fff;border-radius:10px;padding:2px 7px;line-height:1.4}
/* زر الترتيب */
.sort-toggle{display:flex;gap:8px;margin-bottom:12px}
.sort-btn{flex:1;padding:9px 8px;border-radius:var(--r);border:1.5px solid var(--br2);background:var(--bg2);color:var(--tx2);font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;font-family:inherit}
.sort-btn.on{background:var(--AL);color:var(--AD);border-color:var(--AM)}

/* ─── POINT ITEMS ─── */
.pitem{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1.5px solid var(--br);cursor:pointer}
.pitem:last-child{border-bottom:none}
.pav{width:44px;height:44px;border-radius:50%;background:var(--AL);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:var(--AD);flex-shrink:0}

/* ─── BADGES ─── */
.bdg{font-size:13px;padding:4px 11px;border-radius:20px;font-weight:700;white-space:nowrap}
.bdg-a{background:var(--AL);color:var(--AD)}
.bdg-t{background:var(--TL);color:var(--TD)}
.bdg-g{background:var(--GL);color:var(--GD)}
.bdg-p{background:var(--PL);color:var(--PD)}
.bdg-r{background:#FAECE7;color:#993C1D}
.bdg-sha{background:var(--c-sha-bg);color:var(--c-sha);border:1px solid var(--c-sha-bd)}
.bdg-dra{background:var(--c-dra-bg);color:var(--c-dra);border:1px solid var(--c-dra-bd)}
.bdg-qmh{background:var(--c-qmh-bg);color:var(--c-qmh);border:1px solid var(--c-qmh-bd)}

/* ─── ALERTS ─── */
.alrt{padding:13px 16px;border-radius:var(--r);font-size:15px;margin-bottom:13px;line-height:1.6}
.alrt-s{background:var(--TL);color:var(--TD);border:1.5px solid var(--TM)}
.alrt-w{background:var(--AL);color:var(--AD);border:1.5px solid var(--AM)}
.alrt-e{background:#FAECE7;color:#993C1D;border:1.5px solid #F0997B}

/* ─── MODAL ─── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fi .15s ease}
.modal{background:var(--bg);border-radius:22px 22px 0 0;width:100%;max-width:480px;padding:22px 16px;padding-bottom:calc(22px + var(--sb));max-height:92vh;overflow-y:auto;position:relative}
.modal-handle{width:44px;height:5px;background:var(--br2);border-radius:3px;margin:0 auto 16px}
.modal-title{font-size:19px;font-weight:800;margin-bottom:16px}

/* ─── SETTLEMENT ─── */
.settle-hero{text-align:center;padding:18px 0 12px}
.settle-hero-amount{font-size:42px;font-weight:800;color:var(--A);line-height:1}
.settle-hero-lbl{font-size:15px;color:var(--tx2);margin-top:5px}
.settle-period{background:var(--bg2);border-radius:var(--r);padding:12px 16px;margin-bottom:14px;font-size:14px;color:var(--tx2);text-align:center;border:1px solid var(--br)}
.settle-period strong{color:var(--tx);font-size:15px}
.settle-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
.settle-box{background:var(--bg2);border-radius:var(--r);padding:12px 8px;text-align:center;border:1.5px solid var(--br)}
.settle-box-val{font-size:26px;font-weight:800;color:var(--tx)}
.settle-box-lbl{font-size:13px;color:var(--tx2);margin-top:4px;font-weight:600}
.settle-box.green{border-color:var(--TM)}.settle-box.green .settle-box-val{color:var(--T)}
.settle-box.red{border-color:#F0997B}.settle-box.red .settle-box-val{color:#D85A30}
.debt-banner{border-radius:var(--r);padding:14px 18px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.debt-banner.has-debt{background:#FAECE7;border:2px solid #F0997B}
.debt-banner.no-debt{background:var(--TL);border:2px solid var(--TM)}
.settle-hist-item{padding:14px 0;border-bottom:1.5px solid var(--br)}
.settle-hist-item:last-child{border-bottom:none}
.settle-hist-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.settle-hist-date{font-size:16px;font-weight:800;color:var(--tx)}
.settle-hist-period{font-size:13px;color:var(--tx2);margin-bottom:7px}
.settle-hist-detail{display:flex;gap:7px;flex-wrap:wrap}
/* archived deliveries in settlement */
.arch-item{padding:8px 0;border-bottom:1px solid var(--br);display:flex;justify-content:space-between;align-items:center}
.arch-item:last-child{border-bottom:none}
.arch-time{font-size:16px;font-weight:700;color:var(--tx2)}
.arch-counts{display:flex;gap:5px;flex-wrap:wrap}
/* ─── اختيار الأيام للتخليص ─── */
.day-row{display:flex;align-items:center;gap:12px;padding:12px;border-radius:var(--r);border:2px solid var(--br);margin-bottom:10px;cursor:pointer;transition:all .15s;background:var(--bg)}
.day-row.selected{border-color:var(--A);background:var(--AL)}
.day-row input[type=checkbox]{width:22px;height:22px;accent-color:var(--A);cursor:pointer;flex-shrink:0}
.day-row-info{flex:1}
.day-row-date{font-size:16px;font-weight:800;color:var(--tx)}
.day-row-detail{font-size:13px;color:var(--tx2);margin-top:3px}
.day-row-val{text-align:left;flex-shrink:0}
.day-row-count{font-size:20px;font-weight:800;color:var(--tx)}
.day-row-dh{font-size:14px;font-weight:700;color:var(--A);margin-top:2px}
.day-row.selected .day-row-date{color:var(--AD)}
.day-row.selected .day-row-count{color:var(--AX)}
.settle-confirm-overlay{
  position:absolute;inset:0;background:var(--bg);border-radius:22px 22px 0 0;
  z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:28px 20px;text-align:center;animation:fi .2s ease
}
.settle-confirm-icon{font-size:54px;margin-bottom:16px}
.settle-confirm-title{font-size:20px;font-weight:900;color:var(--tx);margin-bottom:6px}
.settle-confirm-sub{font-size:14px;color:var(--tx2);margin-bottom:20px}
.settle-confirm-box{background:var(--bg2);border-radius:var(--r);padding:16px 20px;
  width:100%;margin-bottom:22px;border:2px solid var(--br)}
.settle-confirm-amount{font-size:38px;font-weight:900;color:var(--A);line-height:1}
.settle-confirm-detail{font-size:14px;color:var(--tx2);margin-top:6px}
.settle-live-count{font-size:36px;font-weight:800;color:var(--A);line-height:1}
.settle-live-dh{font-size:18px;font-weight:700;color:var(--tx2);margin-top:4px}
.settle-remaining{background:#FAECE7;border-radius:var(--r);padding:12px 16px;border:2px solid #F0997B;margin-top:10px}
.settle-remaining-lbl{font-size:14px;font-weight:700;color:#993C1D}
.settle-remaining-val{font-size:24px;font-weight:800;color:#D85A30;margin-top:3px}

/* ─── SETTINGS ─── */
.srow{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1.5px solid var(--br)}
.srow:last-child{border-bottom:none}
.srow-lbl{font-size:15px;font-weight:600;color:var(--tx)}
.srow-sub{font-size:13px;color:var(--tx2);margin-top:3px}
.switch{width:52px;height:30px;background:var(--br2);border-radius:15px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;border:none}
.switch.on{background:var(--A)}
.switch::after{content:'';position:absolute;top:3px;right:3px;width:24px;height:24px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.switch.on::after{transform:translateX(-22px)}
.sync-status{display:flex;align-items:center;gap:8px;font-size:14px;padding:12px 15px;border-radius:var(--r);margin-bottom:13px}
.sync-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.sync-ok{background:var(--TL);color:var(--TD)}.sync-dot-ok{background:var(--T)}
.sync-err{background:#FAECE7;color:#993C1D}.sync-dot-err{background:#D85A30}
.sync-pending{background:var(--AL);color:var(--AD)}.sync-dot-pending{background:var(--A);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.theme-pills{display:flex;gap:10px;justify-content:center}
.theme-pill{flex:1;padding:12px 6px;border-radius:var(--r);font-size:14px;cursor:pointer;border:1.5px solid var(--br2);background:var(--bg2);color:var(--tx2);font-weight:600;text-align:center;transition:all .15s}
.theme-pill.on{background:var(--AL);color:var(--AD);border-color:var(--A)}
.balance-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--br);font-size:14px}
.balance-row:last-child{border-bottom:none}
.back-btn{display:flex;align-items:center;gap:7px;background:none;border:none;color:var(--A);cursor:pointer;font-size:16px;font-family:inherit;font-weight:700;padding:0 0 16px}
.bbar{margin:6px 0}.bbar-head{display:flex;justify-content:space-between;font-size:13px;color:var(--tx2);margin-bottom:4px}
.btrack{height:12px;background:var(--bg2);border-radius:6px;overflow:hidden;position:relative}
.bfill{height:100%;background:var(--AM);border-radius:6px;transition:width .5s;position:relative}
.bfill-left{position:absolute;top:0;right:0;height:100%;background:#F0997B;border-radius:0 6px 6px 0;transition:width .5s}

<script>
// ═══════════════════════════════════════════════
//  ثلاثة أنواع فقط — بدون شعير صغير
// ═══════════════════════════════════════════════
const TK = ['sha3ir_k','dra','qmh'];
const TM = {
  sha3ir_k:{ label:'خبز الشعير', short:'شعير', icon:'🌾', cls:'sha', bdgCls:'bdg-sha' },
  dra:     { label:'خبز الذرة',  short:'ذرة',   icon:'🌽', cls:'dra', bdgCls:'bdg-dra' },
  qmh:     { label:'خبز القمح', short:'قمح',   icon:'🌾', cls:'qmh', bdgCls:'bdg-qmh' }
};
const DP = { sha3ir_k:2.50, dra:2.50, qmh:2.50 };
const TODAY = new Date().toISOString().split('T')[0];
const YESTERDAY = (()=>{const d=new Date();d.setDate(d.getDate()-1);return d.toISOString().split('T')[0];})();

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let S = {points:[], deliveries:[], leftovers:[], drivers:[], settlements:[]};
let CFG = {googleClientId:'', autoSync:false, theme:'auto', managerPin:'', driverMode:false};
let SESSION = {role:'manager', driverName:''}; // الجلسة الحالية
let CUR='home', SEL_PT=null;
let DF = {ptId:'', items:ei(), time:nstr(), driver:'', notes:'', notePrivate:'', notePublic:'', leftMode:false, lPtId:'', lItems:ei(), lType:'yesterday'};
let PT_SORT = 'manual'; // 'manual' | 'usage'
let AFTER_SUBMIT = null; // {ptId, cnt, val, ptName}
let AFTER_LEFT = null;  // {ptId, ptName, lType, cnt, val, delivCnt, delivVal}
let GD = {token:null, fileId:null, tokenExpiry:null, status:'idle'};
let deferredInstall=null;

function ei(){ return {sha3ir_k:'',dra:'',qmh:''} }
function nstr(){ const d=new Date(); return pad(d.getHours())+':'+pad(d.getMinutes()) }
function pad(n){ return String(n).padStart(2,'0') }
function dl(d){ const p=d.split('-'); return p[2]+'/'+p[1]+'/'+p[0] }
function fdate(d){
  const D=['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
  const Mo=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  const dt=new Date(d+'T12:00:00');
  return D[dt.getDay()]+' '+dt.getDate()+' '+Mo[dt.getMonth()]+' '+dt.getFullYear();
}

// ═══════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════
function gpr(ptId){ const pt=S.points.find(p=>p.id===ptId); return {...DP,...(pt?.prices||{})} }
function cval(items,ptId){ const pr=gpr(ptId); return TK.reduce((s,k)=>s+(parseInt(items[k])||0)*pr[k],0) }
function ccount(items){ return TK.reduce((s,k)=>s+(parseInt(items[k])||0),0) }
function hasI(items){ return TK.some(k=>parseInt(items[k])>0) }
function gd(ptId,date){ return S.deliveries.filter(d=>d.ptId===ptId&&d.date===date) }
// إرجاع كل الفوائض لنقطة وتاريخ (مصفوفة بدل سجل واحد)
function gls(ptId,date){ return S.leftovers.filter(l=>l.ptId===ptId&&l.date===date); }
// للتوافق مع الكود القديم — أول فائض فقط (نادراً ما يُستخدم)
function gl(ptId,date){ return S.leftovers.find(l=>l.ptId===ptId&&l.date===date)||null; }
// مجموع كمية الفوائض لنقطة ويوم
function glCount(ptId,date){ return gls(ptId,date).reduce((s,l)=>s+ccount(l.items),0); }
function glVal(ptId,date,pr){ return gls(ptId,date).reduce((s,l)=>s+cval(l.items,ptId),0); }
function ptNet(ptId,date){
  const t=gd(ptId,date).reduce((s,d)=>s+cval(d.items,ptId),0);
  return t-glVal(ptId,date);
}
function ptNetCount(ptId,date){
  const t=gd(ptId,date).reduce((s,d)=>s+ccount(d.items),0);
  return t-glCount(ptId,date);
}
function todayCA(){
  const t=S.deliveries.filter(d=>d.date===TODAY).reduce((s,d)=>s+cval(d.items,d.ptId),0);
  const l=S.leftovers.filter(l=>l.date===TODAY).reduce((s,l)=>s+cval(l.items,l.ptId),0);
  return t-l;
}
function todayCount(){
  const t=S.deliveries.filter(d=>d.date===TODAY).reduce((s,d)=>s+ccount(d.items),0);
  const l=S.leftovers.filter(l=>l.date===TODAY).reduce((s,l)=>s+ccount(l.items),0);
  return t-l;
}
function btTime(ptId){
  const ds=S.deliveries.filter(d=>d.ptId===ptId); if(ds.length<2)return null;
  const h={}; ds.forEach(d=>{const hr=d.time.split(':')[0]; h[hr]=(h[hr]||0)+ccount(d.items)});
  const b=Object.entries(h).sort((a,b)=>b[1]-a[1])[0]; return b?b[0]+':00':null;
}
function sByDay(ptId){
  const days={};
  S.deliveries.filter(d=>d.ptId===ptId).forEach(d=>{
    if(!days[d.date])days[d.date]={del:0,lft:0};
    days[d.date].del+=ccount(d.items);
  });
  // الفائض يُطرح من تاريخه الخاص (قد يكون أمس أو اليوم)
  S.leftovers.filter(l=>l.ptId===ptId).forEach(l=>{
    if(!days[l.date])days[l.date]={del:0,lft:0};
    days[l.date].lft+=ccount(l.items);
  });
  return Object.entries(days).sort((a,b)=>a[0]>b[0]?-1:1).slice(0,10);
}

// عرض تفصيل الكميات بالشارات الملونة
function dcounts(items){
  return TK.filter(k=>parseInt(items[k])>0).map(k=>
    `<span class="dcount dcount-${TM[k].cls}">${TM[k].icon} ${items[k]}</span>`
  ).join('');
}
function fmtI(items){ return TK.filter(k=>parseInt(items[k])>0).map(k=>`${items[k]} ${TM[k].short}`).join(' + ') }

// ═══════════════════════════════════════════════
//  SETTLEMENT HELPERS — نظام التخليص حسب الأيام
// ═══════════════════════════════════════════════
function getUnsettledDeliveries(ptId){
  // المعرّفات المخلَّصة صراحةً (النظام الجديد)
  const explicitIds=new Set(
    S.settlements.filter(s=>s.ptId===ptId&&s.settledDeliveryIds)
      .flatMap(s=>s.settledDeliveryIds)
  );
  // آخر تخليص بالنظام القديم (بدون settledDeliveryIds)
  const oldSt=S.settlements.filter(s=>s.ptId===ptId&&!s.settledDeliveryIds);
  const lastOldId=oldSt.length>0?Math.max(...oldSt.map(s=>parseInt(s.id))):0;
  return S.deliveries.filter(d=>
    d.ptId===ptId&&!explicitIds.has(d.id)&&parseInt(d.id)>lastOldId
  );
}

function ptDebt(ptId){
  const unsettled=getUnsettledDeliveries(ptId);
  const unsettledDates=new Set(unsettled.map(d=>d.date));
  const totalNet=unsettled.reduce((s,d)=>s+cval(d.items,ptId),0)
    -S.leftovers.filter(l=>l.ptId===ptId&&unsettledDates.has(l.date))
      .reduce((s,l)=>s+cval(l.items,ptId),0);
  // رصيد متبقي من تخليصات جزئية سابقة
  const prevRemaining=S.settlements.filter(s=>s.ptId===ptId)
    .reduce((s,st)=>s+(st.remainingBalance||0),0);
  return Math.max(0,totalNet+prevRemaining);
}

// دين الأيام السابقة فقط — بدون احتساب اليوم الجاري
function ptOldDebt(ptId){
  const unsettled=getUnsettledDeliveries(ptId).filter(d=>d.date<TODAY);
  const prevRemaining=S.settlements.filter(s=>s.ptId===ptId)
    .reduce((s,st)=>s+(st.remainingBalance||0),0);
  if(!unsettled.length) return Math.max(0,prevRemaining);
  const unsettledDates=new Set(unsettled.map(d=>d.date));
  const totalNet=unsettled.reduce((s,d)=>s+cval(d.items,ptId),0)
    -S.leftovers.filter(l=>l.ptId===ptId&&unsettledDates.has(l.date))
      .reduce((s,l)=>s+cval(l.items,ptId),0);
  return Math.max(0,totalNet+prevRemaining);
}

function calcSettlement(ptId){
  const unsettled=getUnsettledDeliveries(ptId);
  if(!unsettled.length)return null;
  // تجميع التسليمات حسب اليوم
  const byDay={};
  unsettled.forEach(d=>{if(!byDay[d.date])byDay[d.date]=[];byDay[d.date].push(d);});
  const days=Object.entries(byDay).sort((a,b)=>a[0]>b[0]?1:-1); // ترتيب تصاعدي
  const allDates=unsettled.map(d=>d.date).sort();
  const periodStart=allDates[0];const periodEnd=allDates[allDates.length-1];
  const leftsInPeriod=S.leftovers.filter(l=>l.ptId===ptId&&l.date>=periodStart&&l.date<=periodEnd);
  const delivered=ei(),leftover=ei();
  unsettled.forEach(d=>TK.forEach(k=>{delivered[k]=(parseInt(delivered[k])||0)+(parseInt(d.items[k])||0)}));
  leftsInPeriod.forEach(l=>TK.forEach(k=>{leftover[k]=(parseInt(leftover[k])||0)+(parseInt(l.items[k])||0)}));
  const totalDelivCount=TK.reduce((s,k)=>s+(parseInt(delivered[k])||0),0);
  const totalLeftCount=TK.reduce((s,k)=>s+(parseInt(leftover[k])||0),0);
  const totalNetCount=totalDelivCount-totalLeftCount;
  const totalNet=cval(delivered,ptId)-cval(leftover,ptId);
  const prevRemaining=S.settlements.filter(s=>s.ptId===ptId)
    .reduce((s,st)=>s+(st.remainingBalance||0),0);
  return{ptId,periodStart,periodEnd,delivered,leftover,
    totalDelivered:cval(delivered,ptId),totalLeftover:cval(leftover,ptId),
    totalNet,totalDelivCount,totalLeftCount,totalNetCount,
    delivsInPeriod:unsettled,days,prevRemaining};
}

// حساب مجموع أيام مختارة
function calcForDays(ptId,selectedDates){
  const pr=gpr(ptId);
  const selSet=new Set(selectedDates);
  const selDelivs=getUnsettledDeliveries(ptId).filter(d=>selSet.has(d.date));
  const selLefts=S.leftovers.filter(l=>l.ptId===ptId&&selSet.has(l.date));
  const deliv=ei(),left=ei();
  selDelivs.forEach(d=>TK.forEach(k=>{deliv[k]=(parseInt(deliv[k])||0)+(parseInt(d.items[k])||0)}));
  selLefts.forEach(l=>TK.forEach(k=>{left[k]=(parseInt(left[k])||0)+(parseInt(l.items[k])||0)}));
  const cnt=TK.reduce((s,k)=>s+(parseInt(deliv[k])||0),0)-TK.reduce((s,k)=>s+(parseInt(left[k])||0),0);
  const val=cval(deliv,ptId)-cval(left,ptId);
  return{cnt:Math.max(0,cnt),val:Math.max(0,val),delivIds:selDelivs.map(d=>d.id),delivs:selDelivs};
}

function save(){
  S._ts=Date.now();
  localStorage.setItem('makhbaza_v4',JSON.stringify(S));
  localStorage.setItem('makhbaza_cfg',JSON.stringify(CFG));
}
function loadLocal(){
  try{const r=localStorage.getItem('makhbaza_v4');if(r){const d=JSON.parse(r);Object.assign(S,d);if(!S.settlements)S.settlements=[];}}catch(e){}
  try{const r=localStorage.getItem('makhbaza_cfg');if(r)Object.assign(CFG,JSON.parse(r));}catch(e){}
}
function dataForSync(){ return JSON.stringify({...S,_ts:S._ts||Date.now()}) }
function mergeFromSync(raw){
  try{
    const R=JSON.parse(raw);
    // مفتاح التسليمات والتخليصات: الـ ID
    const mId=(l,r)=>{const m=new Map();l.forEach(x=>m.set(x.id,x));r.forEach(x=>{if(!m.has(x.id))m.set(x.id,x)});return[...m.values()]};
    // مفتاح الفوائض: الـ ID إذا وُجد، وإلا ptId+date (للبيانات القديمة)
    const mLft=(l,r)=>{
      const m=new Map();
      const key=x=>x.id?x.id:(x.ptId+'_'+x.date);
      l.forEach(x=>m.set(key(x),x));
      r.forEach(x=>{if(!m.has(key(x)))m.set(key(x),x);});
      return[...m.values()];
    };
    const mPts=(l,r)=>{const m=new Map();l.forEach(x=>m.set(x.id,x));r.forEach(x=>{if(!m.has(x.id))m.set(x.id,x)});return[...m.values()]};
    S.deliveries=mId(S.deliveries,R.deliveries||[]);
    S.settlements=mId(S.settlements,R.settlements||[]);
    S.leftovers=mLft(S.leftovers,R.leftovers||[]);
    S.points=mPts(S.points,R.points||[]);
    S.drivers=[...new Set([...S.drivers,...(R.drivers||[])])];
    save();render();toast('✓ تمت المزامنة بنجاح');
  }catch(e){toast('خطأ في البيانات','e');}
}

function loadGS(cb){
  if(window.google?.accounts?.oauth2){cb();return;}
  const s=document.createElement('script');s.src='https://accounts.google.com/gsi/client';
  s.onload=cb;s.onerror=()=>{setSync('err');renderSettings();toast('تعذّر تحميل Google','e');};
  document.head.appendChild(s);
}
function googleSignIn(){
  if(!CFG.googleClientId){toast('أدخل Google Client ID أولاً','e');return;}
  setSync('syncing');renderSettings();
  loadGS(()=>{
    try{
      google.accounts.oauth2.initTokenClient({
        client_id:CFG.googleClientId,
        scope:'https://www.googleapis.com/auth/drive.appdata',
        prompt:'',
        callback(resp){
          if(resp.error||!resp.access_token){setSync('err');renderSettings();toast('فشل الربط — تأكد من Client ID والـ origins','e');return;}
          GD.token=resp.access_token;GD.tokenExpiry=Date.now()+((resp.expires_in||3600)-60)*1000;syncDrive();
        },
        error_callback(err){
          setSync('err');renderSettings();
          if(err.type==='popup_closed')toast('أُغلقت نافذة Google','e');
          else if(err.type==='popup_failed_to_open')toast('اسمح بالنوافذ المنبثقة في Chrome','e');
          else toast('خطأ Google: '+err.type,'e');
        }
      }).requestAccessToken();
    }catch(e){setSync('err');renderSettings();toast('خطأ: '+e.message,'e');}
  });
}
async function driveReq(url,opts){
  if(GD.tokenExpiry&&Date.now()>GD.tokenExpiry){GD.token=null;setSync('err');renderSettings();toast('انتهت جلسة Google — أعد الربط','e');return null;}
  const resp=await fetch(url,{...opts,headers:{...opts.headers,Authorization:'Bearer '+GD.token}});
  if(resp.status===401){GD.token=null;setSync('err');renderSettings();toast('خطأ 401 — أعد ربط Google','e');return null;}
  return resp;
}
async function syncDrive(){
  if(!GD.token){googleSignIn();return;}
  setSync('syncing');renderSettings();
  try{
    const sr=await driveReq('https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name%3D%27makhbaza_backup.json%27&fields=files(id)',{headers:{}});
    if(!sr)return;
    const sd=await sr.json();
    if(sd.error){handleDE(sd.error);return;}
    if(sd.files?.length>0){
      GD.fileId=sd.files[0].id;
      const dr=await driveReq('https://www.googleapis.com/drive/v3/files/'+GD.fileId+'?alt=media',{headers:{}});
      if(!dr)return;
      mergeFromSync(await dr.text());
      await uploadD(dataForSync());
      setSync('ok');renderSettings();
    }else{await createD(dataForSync());if(GD.fileId){setSync('ok');renderSettings();toast('✓ تم إنشاء ملف النسخ الاحتياطي');}else{setSync('err');renderSettings();}}
  }catch(e){setSync('err');renderSettings();toast('خطأ: '+e.message,'e');}
}
async function uploadD(content){
  if(!GD.fileId||!GD.token)return;
  const B='mkh_bnd';
  const body='--'+B+'\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n'+JSON.stringify({name:'makhbaza_backup.json'})+'\r\n--'+B+'\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n'+content+'\r\n--'+B+'--';
  return driveReq('https://www.googleapis.com/upload/drive/v3/files/'+GD.fileId+'?uploadType=multipart',{method:'PATCH',headers:{'Content-Type':'multipart/related; boundary='+B},body});
}
async function createD(content){
  if(!GD.token)return;
  const B='mkh_bnd';
  const body='--'+B+'\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n'+JSON.stringify({name:'makhbaza_backup.json',parents:['appDataFolder']})+'\r\n--'+B+'\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n'+content+'\r\n--'+B+'--';
  try{
    const r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',
      {method:'POST',headers:{Authorization:'Bearer '+GD.token,'Content-Type':'multipart/related; boundary='+B},body});
    const d=await r.json();if(d.id)GD.fileId=d.id;else if(d.error)handleDE(d.error);
  }catch(e){toast('فشل الإنشاء: '+e.message,'e');}
}
function handleDE(err){
  GD.token=null;setSync('err');renderSettings();
  if(err.code===401||err.status==='UNAUTHENTICATED')toast('انتهت الجلسة — أعد الربط','e');
  else if(err.code===403)toast('خطأ 403 — تأكد من تفعيل Drive API','e');
  else toast('خطأ Drive: '+(err.message||''),'e');
}
function setSync(s){GD.status=s;}
function syncStatusHtml(){
  const s=GD.status;
  if(s==='syncing')return`<div class="sync-status sync-pending"><div class="sync-dot sync-dot-pending"></div>جاري المزامنة...</div>`;
  if(s==='ok')return`<div class="sync-status sync-ok"><div class="sync-dot sync-dot-ok"></div>تمت المزامنة بنجاح</div>`;
  if(s==='err')return`<div class="sync-status sync-err"><div class="sync-dot sync-dot-err"></div>فشلت المزامنة</div>`;
  return'';
}

function renderHome(){

  const totCount=tds.reduce((s,d)=>s+ccount(d.items),0);

  const lftCA=S.leftovers.filter(l=>l.date===TODAY).reduce((s,l)=>s+cval(l.items,l.ptId),0);
  const lftCount=S.leftovers.filter(l=>l.date===TODAY).reduce((s,l)=>s+ccount(l.items),0);

    <div class="met"><div class="met-lbl">الخبز المباع اليوم</div><div class="met-val">${netCount}</div><div class="met-sub">${netCA.toFixed(2)} د.م صافي</div></div>
    <div class="met"><div class="met-lbl">إجمالي التوزيع</div><div class="met-val">${totCount}</div><div class="met-sub">${totCA.toFixed(2)} د.م موزع</div></div>
    <div class="met"><div class="met-lbl">عمليات المرور</div><div class="met-val">${tds.length}</div><div class="met-sub">${actPts} نقطة مخدومة</div></div>
    <div class="met" style="${totalDebt>0?'border:2px solid #F0997B':''}"><div class="met-lbl">الديون المتراكمة</div><div class="met-val" style="${totalDebt>0?'color:#D85A30':''}">${totalDebt.toFixed(2)}</div><div class="met-sub">درهم مستحق</div></div>
  </div>`;

  if(S.points.length){
    h+=`<div class="slbl">حالة النقاط اليوم</div>`;
    S.points.forEach(pt=>{
      const ds=gd(pt.id,TODAY);
      const cnt=ds.reduce((s,d)=>s+ccount(d.items),0);
      const val=ds.reduce((s,d)=>s+cval(d.items,pt.id),0);
      const lftC=glCount(pt.id,TODAY);const lftV=glVal(pt.id,TODAY);
      const debt=ptDebt(pt.id);
      h+=`<div class="card" style="cursor:pointer" onclick="viewPt('${pt.id}')">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-size:17px;font-weight:800">${pt.name}</div>
            <div style="font-size:14px;color:var(--tx2);margin-top:4px">${ds.length} مرور · فائض: ${lftC} خبزة</div>

          </div>
          <div style="text-align:left">
            <div style="font-size:28px;font-weight:800;color:var(--A)">${cnt-lftC}</div>
            <div style="font-size:12px;color:var(--tx2)">خبزة مباعة</div>
            <div style="font-size:14px;font-weight:700;color:var(--A)">${(val-lftV).toFixed(2)} د.م</div>
          </div>
        </div>
      </div>`;
    });
  }

  h+=`<div class="slbl">آخر التسليمات (الأحدث في الأسفل)</div>`;
  if(!tds.length){h+=`<div class="empty"><div class="empty-icon">🚚</div>لم يتم تسجيل أي تسليم اليوم</div>`;}
  else{
    h+=`<div class="card">`;
    [...tds].sort((a,b)=>a.time>b.time?1:-1).forEach(d=>{
      const pt=S.points.find(p=>p.id===d.ptId);
      h+=`<div class="ditem">
        <div class="ditem-top">
          <div class="ditem-time">${d.time}</div>
          <div style="font-size:14px;font-weight:600;color:var(--tx2)">${pt?pt.name:'?'}</div>
          ${d.driver?`<div class="ditem-driver">👤 ${d.driver}</div>`:''}
        </div>
        <div class="ditem-counts">${dcounts(d.items)}</div>
      </div>`;
    });
    h+=`</div>`;
  }
  document.getElementById('scr-home').innerHTML=h;
}

function bTGrid(items,ptId,pfx,onchg){
  const pr=ptId?gpr(ptId):DP;
  // الترتيب: شعير → قمح → ذرة (عمودياً)
  const orderedKeys=['sha3ir_k','qmh','dra'];
  let h=`<div class="tgrid">`;
  orderedKeys.forEach(k=>{
    const v=parseInt(items[k])||0; const t=TM[k];
    h+=`<div class="tcard tcard-${t.cls}">
      <div class="tcard-left">
        <div class="tcard-icon">${t.icon}</div>
        <div class="tcard-nm tcard-nm-${t.cls}">${t.label.replace('خبز ','')}</div>
        <div class="tcard-pr">${pr[k].toFixed(2)} د.م</div>
      </div>
      <div class="tcard-right">
        <div class="tcard-adj">
          <button type="button" class="tcard-adj-btn" onclick="adjTC('${k}','${pfx}',${onchg?'true':'false'},-1)">−</button>
          <input type="number" id="tc-${k}" min="0" step="1" placeholder="0" inputmode="numeric" autocomplete="off" value="${v||''}"
            oninput="${pfx}['${k}']=this.value${onchg?';'+onchg:''}"
            onchange="${pfx}['${k}']=this.value${onchg?';'+onchg:''}"
            onfocus="this.select()">
          <button type="button" class="tcard-adj-btn" onclick="adjTC('${k}','${pfx}',${onchg?'true':'false'},1)">+</button>
        </div>
      </div>
    </div>`;
  });
  h+=`</div>`;return h;
}

function adjTC(k,pfx,hasOnchg,delta){
  const inp=document.getElementById('tc-'+k);if(!inp)return;
  const newVal=Math.max(0,(parseInt(inp.value)||0)+delta);
  inp.value=newVal;
  // update state
  if(pfx==='DF.items') DF.items[k]=String(newVal);
  else if(pfx==='DF.lItems') DF.lItems[k]=String(newVal);
  if(hasOnchg) updSum();
}

    pts.sort((a,b)=>(usageMap[b.id]||0)-(usageMap[a.id]||0));

  else{
    h+=`<div class="pt-btn-grid">`;
    pts.forEach(pt=>{

      const cntToday=gd(pt.id,TODAY).reduce((s,d)=>s+ccount(d.items),0);

  h+=`<div class="mode-btns" style="margin-top:12px">
    <div class="mode-btn on">🚚<br>تسليم خبز</div>

  h+=`<div style="font-size:15px;font-weight:800;color:var(--tx2);text-transform:uppercase;letter-spacing:.04em;margin:10px 0 10px">② الكميات حسب النوع</div>`;

  // ─── بانر اسم النقطة المختارة ───────────────
  if(ptId){
    const pt=S.points.find(p=>p.id===ptId);
    h+=`<div class="pt-selected-banner">
      <div>
        <div class="pt-selected-banner-lbl">📍 نقطة البيع المختارة</div>
        <div class="pt-selected-banner-name">${pt?pt.name:'?'}</div>
      </div>
      <button onclick="DF.ptId='';renderDeliv()" style="background:rgba(255,255,255,.25);border:none;color:#fff;border-radius:8px;padding:6px 10px;font-size:13px;font-family:inherit;cursor:pointer">تغيير</button>
    </div>`;
  }

  h+=bTGrid(items,ptId,'DF.items','updSum()');

  // ─── الملخص الموسّع ───────────────────────────
  if(hasQ){
    const pr=gpr(ptId);
    const lftCnt=glCount(ptId,TODAY);
    const lftVal=glVal(ptId,TODAY);
    const prevDelivs=gd(ptId,TODAY);
    const prevCnt=prevDelivs.reduce((s,d)=>s+ccount(d.items),0);
    const prevVal=prevDelivs.reduce((s,d)=>s+cval(d.items,ptId),0);
    const netCnt=prevCnt+totalCnt-lftCnt;
    const netVal=prevVal+total-lftVal;

    h+=`<div class="sum-box" id="dsum">
      <div style="font-size:13px;font-weight:700;color:var(--AD);margin-bottom:8px">📋 ملخص هذا التسليم</div>`;
    TK.forEach(k=>{const q=parseInt(items[k])||0;if(!q)return;

    });
    h+=`<div class="sum-row sum-total"><span>هذه العملية: ${totalCnt} خبزة</span><span>${total.toFixed(2)} د.م</span></div>`;

    // قسم حالة اليوم الكاملة

        h+=`<div class="sum-row"><span>✓ مسلَّم سابقاً اليوم</span><span>${prevCnt} خبزة</span></div>`;

      <input type="text" id="f-drv" list="drvs" value="${DF.driver}" placeholder="الاسم" autocomplete="off" name="bread-driver-x7" oninput="DF.driver=this.value">
      <datalist id="drvs">${S.drivers.map(d=>`<option value="${d}">`).join('')}</datalist>
    </div></div>`;
  h+=`<div class="fg"><label class="fl">🔒 ملاحظة داخلية <span style="font-size:12px;font-weight:400;color:var(--tx3)">(لا تظهر في الطباعة)</span></label>
    <input type="text" id="f-note-priv" value="${DF.notePrivate||''}" placeholder="ملاحظة خاصة بالمخبزة..." autocomplete="off" name="np-x9" oninput="DF.notePrivate=this.value"></div>`;
  h+=`<div class="fg"><label class="fl">📋 ملاحظة للمسؤول <span style="font-size:12px;font-weight:400;color:var(--tx3)">(تظهر في الطباعة)</span></label>
    <input type="text" id="f-note-pub" value="${DF.notePublic||''}" placeholder="ملاحظة لمسؤول نقطة البيع..." autocomplete="off" name="npb-x9" oninput="DF.notePublic=this.value"></div>`;
  // الزر يظهر فقط عند اختيار نقطة + إدخال كمية
  if(ptId&&hasQ){
    h+=`<div class="sticky-submit"><button class="btn btn-p" onclick="submitDeliv()" style="font-size:19px;padding:17px">✓ تسجيل التسليم</button></div>`;
  }
  return h;
}

function selPt(id){
  DF.ptId=id;
  DF.time=nstr(); // تحديث الساعة عند اختيار النقطة
  renderDeliv();
}

function updSum(){
  // قراءة مباشرة من DOM بدون تخزين مؤقت
  TK.forEach(k=>{
    const inp=document.getElementById('tc-'+k);
    if(inp) DF.items[k]=inp.value||'0';
  });
  const ptId=DF.ptId;if(!ptId){_hideSubmitBtn();return;}
  const pr=gpr(ptId);const items=DF.items;
  // حساب مباشر بدون الاعتماد على DF.items المحفوظة
  const totalCnt=TK.reduce((s,k)=>s+(parseInt(document.getElementById('tc-'+k)?.value)||0),0);
  const hasQ=totalCnt>0;

  const lftCnt=glCount(ptId,TODAY);const lftVal=glVal(ptId,TODAY);
  const total=cval(items,ptId);
  const prevDelivs=gd(ptId,TODAY);
  const prevCnt=prevDelivs.reduce((s,d)=>s+ccount(d.items),0);
  const prevVal=prevDelivs.reduce((s,d)=>s+cval(d.items,ptId),0);
  const netCnt=prevCnt+totalCnt-lftCnt;
  const netVal=prevVal+total-lftVal;

  let box=document.getElementById('dsum');
  if(hasQ){
    let inner=`<div style="font-size:13px;font-weight:700;color:var(--AD);margin-bottom:8px">📋 ملخص هذا التسليم</div>`;
    TK.forEach(k=>{const q=parseInt(items[k])||0;if(!q)return;
      inner+=`<div class="sum-row"><span>${TM[k].icon} ${q} ${TM[k].label}</span><span>${(q*pr[k]).toFixed(2)} د.م</span></div>`;
    });
    inner+=`<div class="sum-row sum-total"><span>هذه العملية: ${totalCnt} خبزة</span><span>${total.toFixed(2)} د.م</span></div>`;
    if(prevCnt>0||lftCnt>0){
      inner+=`<div class="sum-section"><div class="sum-section-title">حالة هذه النقطة اليوم</div>`;
      if(prevCnt>0)inner+=`<div class="sum-row"><span>✓ مسلَّم سابقاً اليوم</span><span>${prevCnt} خبزة</span></div>`;
      inner+=`<div class="sum-row"><span>🔄 هذه العملية</span><span>+ ${totalCnt} خبزة</span></div>`;
      if(lftCnt>0)inner+=`<div class="sum-row" style="color:#D85A30"><span>↩ فائض مسجَّل</span><span>− ${lftCnt} خبزة</span></div>`;
      inner+=`<div class="sum-net ${netCnt<0?'sum-net-red':''}"><span>🍞 الصافي اليوم</span><span>${netCnt} خبزة · ${netVal.toFixed(2)} د.م</span></div></div>`;
    }
    if(!box){const d2=document.createElement('div');d2.className='sum-box';d2.id='dsum';d2.innerHTML=inner;document.querySelector('#scr-deliv .tgrid')?.after(d2);}
    else box.innerHTML=inner;
    // ── إظهار زر التسجيل ──
    _showSubmitBtn();
  }else{
    if(box)box.remove();
    // ── إخفاء زر التسجيل ──
    _hideSubmitBtn();
  }
}

function _showSubmitBtn(){
  const sb=document.getElementById('sticky-submit-deliv');
  if(sb){sb.style.display='block';sb.style.opacity='1';}
}
function _hideSubmitBtn(){
  const sb=document.getElementById('sticky-submit-deliv');
  if(sb){sb.style.display='none';}
}

function submitDeliv(){
  const ptId=DF.ptId;
  const time=document.getElementById('f-time')?.value||DF.time;
  const driver=(document.getElementById('f-drv')?.value||DF.driver).trim();
  const notePrivate=(document.getElementById('f-note-priv')?.value||DF.notePrivate||'').trim();
  const notePublic=(document.getElementById('f-note-pub')?.value||DF.notePublic||'').trim();
  const notes=notePublic||notePrivate;
  const items=ei();
  TK.forEach(k=>{const inp=document.getElementById('tc-'+k);if(inp)items[k]=inp.value||'0';});
  if(!ptId){toast('اختر نقطة بيع','e');return;}
  if(!hasI(items)){toast('أدخل كمية خبز','e');return;}
  const cnt=ccount(items);const val=cval(items,ptId);
  S.deliveries.push({id:Date.now()+'',ptId,date:TODAY,time:time||nstr(),items,driver,notes,notePrivate,notePublic});
  if(driver&&!S.drivers.includes(driver))S.drivers.push(driver);
  const pt=S.points.find(p=>p.id===ptId);
  AFTER_SUBMIT={ptId,cnt,val,ptName:pt?pt.name:'?'};
  DF={...DF,items:ei(),notes:'',notePrivate:'',notePublic:'',leftMode:false,time:nstr()};
  save();autoSync();toast(`✓ ${cnt} خبزة — ${val.toFixed(2)} د.م`);renderDeliv();scrollTop();
}
function goLeftSamePt(ptId){
  AFTER_SUBMIT=null;AFTER_LEFT=null;
  _hideSubmitBtn();
  DF={...DF,leftMode:true,lPtId:ptId,lItems:ei()};
  renderDeliv();scrollTop();
}
function goNewDeliv(){
  AFTER_SUBMIT=null;AFTER_LEFT=null;
  DF={...DF,leftMode:false,ptId:'',items:ei()};
  renderDeliv();scrollTop();
}

function bLeftForm(){
  const items=DF.lItems;const ptId=DF.lPtId;const lType=DF.lType||'yesterday';
  const total=ptId?cval(items,ptId):0;const cnt=ccount(items);const hasQ=hasI(items)&&ptId;

  const todayDelivs=ptId?gd(ptId,TODAY):[];
  const todayCnt=todayDelivs.reduce((s,d)=>s+ccount(d.items),0);
  const yestDelivs=ptId?S.deliveries.filter(d=>d.ptId===ptId&&d.date===YESTERDAY):[];
  const yestCnt=yestDelivs.reduce((s,d)=>s+ccount(d.items),0);
  const yestLeftCnt=glCount(ptId,YESTERDAY);

  let h=``;

  // ─── STEP 1: اختر نقطة البيع ───────────────────
  h+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
    <div style="width:26px;height:26px;border-radius:50%;background:var(--A);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0">1</div>
    <div style="font-size:15px;font-weight:800;color:var(--tx2)">اختر نقطة البيع</div>
  </div>`;

  if(!S.points.length){
    h+=`<div class="alrt alrt-w">أضف نقطة بيع أولاً</div>`;
  }else{
    h+=`<div class="pt-btn-grid">`;
    S.points.forEach(pt=>{
      const isSel=ptId===pt.id;
      const c=gd(pt.id,TODAY).reduce((s,d)=>s+ccount(d.items),0);
      h+=`<div class="pt-btn ${isSel?'selected':''}" onclick="DF.lPtId='${pt.id}';DF.lType='yesterday';DF.lItems=ei();renderDeliv()">
        <div class="pt-btn-name">${pt.name}</div>
        <div class="pt-btn-meta">${c} خبزة اليوم</div>
      </div>`;
    });
    h+=`</div>`;
  }

  // ─── زرا التسليم/الفائض ───
  h+=`<div class="mode-btns" style="margin-top:12px">
    <div class="mode-btn" onclick="setMode(false)">🚚<br>تسليم خبز</div>
    <div class="mode-btn on">📦<br>تسجيل فائض</div>
  </div>`;

  // ─── STEP 2: نوع الفائض — يظهر فقط بعد اختيار النقطة ───
  if(ptId){
    h+=`<div style="display:flex;align-items:center;gap:8px;margin:16px 0 10px">
      <div style="width:26px;height:26px;border-radius:50%;background:var(--A);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0">2</div>
      <div style="font-size:15px;font-weight:800;color:var(--tx2)">ما نوع الفائض؟</div>
    </div>`;

    // بطاقات النوع — أكبر وأوضح مع وصف عملي
    h+=`<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px">`;

    const types=[
      {v:'yesterday', icon:'🥖', lbl:'الخبز البارد',
       desc:`خبز متبقي من أمس — يُطرح من مستحقات ${dl(YESTERDAY)}`,
       color:'var(--c-sha-bd)', bg:'var(--c-sha-bg)',
       extra: yestCnt>0?`وُزِّع أمس: ${yestCnt} خبزة${yestLeftCnt>0?' · مسجَّل سابقاً: '+yestLeftCnt:''}`:''
      },
      {v:'swap', icon:'🔄', lbl:'استبدال',
       desc:`سحبت خبزاً يابساً ووضعت مكانه طازجاً — يُطرح من اليوم`,
       color:'var(--c-qmh-bd)', bg:'var(--c-qmh-bg)',
       extra: todayCnt>0?`وُزِّع اليوم: ${todayCnt} خبزة`:''
      },
      {v:'transfer', icon:'➡️', lbl:'نقل لنقطة أخرى',
       desc:'سحبت خبزاً صالحاً لنقطة ذات رواج أعلى — يُطرح من اليوم',
       color:'var(--c-dra-bd)', bg:'var(--c-dra-bg)',
       extra:''
      },
    ];

    types.forEach(tp=>{
      const isOn=lType===tp.v;
      h+=`<div onclick="DF.lType='${tp.v}';DF.lItems=ei();renderDeliv()"
        style="border:3px solid ${isOn?'var(--A)':tp.color};background:${isOn?'var(--AL)':tp.bg};
          border-radius:var(--r);padding:14px 16px;cursor:pointer;transition:all .15s;
          display:flex;align-items:center;gap:14px">
        <div style="font-size:32px;flex-shrink:0">${tp.icon}</div>
        <div style="flex:1">
          <div style="font-size:16px;font-weight:800;color:${isOn?'var(--AD)':'var(--tx)'}">${tp.lbl}</div>
          <div style="font-size:13px;color:${isOn?'var(--AD)':'var(--tx2)'};margin-top:3px">${tp.desc}</div>
          ${tp.extra?`<div style="font-size:12px;color:var(--A);font-weight:700;margin-top:4px">📊 ${tp.extra}</div>`:''}
        </div>
        ${isOn?`<div style="font-size:22px">✓</div>`:''}
      </div>`;
    });
    h+=`</div>`;

    // ─── STEP 3: أدخل الكميات — يظهر فقط بعد اختيار النوع ───
    h+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
      <div style="width:26px;height:26px;border-radius:50%;background:var(--A);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0">3</div>
      <div style="font-size:15px;font-weight:800;color:var(--tx2)">أدخل الكميات المسحوبة</div>
    </div>`;

    // ملاحظة تحذيرية للاستبدال
    if(lType==='swap'){
      h+=`<div class="alrt alrt-w" style="margin-bottom:12px;font-size:14px">
        ⚠️ أدخل فقط عدد الخبز الذي <strong>سحبته</strong> — الخبز الجديد الذي وضعته بديلاً <strong>لا تُسجّله هنا</strong>
      </div>`;
    }else if(lType==='transfer'){
      h+=`<div class="alrt alrt-s" style="margin-bottom:12px;font-size:14px">
        💡 بعد التسجيل، سجّل هذا الخبز كـ <strong>تسليم جديد</strong> للنقطة التي نقلته إليها
      </div>`;
    }

    // بانر اسم النقطة
    const ptObj=S.points.find(p=>p.id===ptId);
    const dateLabel=lType==='yesterday'?`أمس (${dl(YESTERDAY)})`:'اليوم';
    h+=`<div class="pt-selected-banner">
      <div>
        <div class="pt-selected-banner-lbl">📍 ${lType==='yesterday'?'الخبز البارد لـ':lType==='swap'?'استبدال لـ':'نقل من'} — ${dateLabel}</div>
        <div class="pt-selected-banner-name">${ptObj?ptObj.name:'?'}</div>
      </div>
    </div>`;

    h+=bTGrid(items,ptId,'DF.lItems',null);

    // الملخص
    if(hasQ){
      const pr=gpr(ptId);
      const targetDate=lType==='yesterday'?YESTERDAY:TODAY;
      const targetDelivs=S.deliveries.filter(d=>d.ptId===ptId&&d.date===targetDate);
      const targetCnt=targetDelivs.reduce((s,d)=>s+ccount(d.items),0);
      const targetVal=targetDelivs.reduce((s,d)=>s+cval(d.items,ptId),0);
      const netAfter=targetCnt-cnt;
      const netValAfter=targetVal-total;
      h+=`<div class="sum-box">
        <div style="font-size:13px;font-weight:700;color:var(--AD);margin-bottom:8px">
          📋 ${lType==='yesterday'?'يُطرح من أمس':'يُطرح من اليوم'}
        </div>`;
      TK.forEach(k=>{const q=parseInt(items[k])||0;if(!q)return;
        h+=`<div class="sum-row"><span>${TM[k].icon} ${q} ${TM[k].label}</span><span>− ${(q*pr[k]).toFixed(2)} د.م</span></div>`;
      });
      h+=`<div class="sum-row sum-total"><span>مسحوب: ${cnt} خبزة</span><span>− ${total.toFixed(2)} د.م</span></div>`;
      if(targetCnt>0){
        h+=`<div style="margin-top:8px;padding-top:8px;border-top:1px dashed var(--AM)">
          <div class="sum-row"><span>موزَّع ${lType==='yesterday'?'أمس':'اليوم'}</span><span>${targetCnt} خبزة</span></div>
          <div class="sum-net ${netAfter<0?'sum-net-red':''}"><span>الصافي بعد الطرح</span><span>${netAfter} خبزة · ${netValAfter.toFixed(2)} د.م</span></div>
        </div>`;
      }
      h+=`</div>`;
    }

    h+=`<div class="sticky-submit"><button class="btn btn-p" onclick="submitLeft()" style="font-size:19px;padding:17px">✓ تسجيل الفائض</button></div>`;
  }

  h+=`<button class="btn btn-s" style="margin-top:10px" onclick="setMode(false)">⬅ رجوع للتسليم</button>`;

  // ─── الفائض المسجل ───
  const allLeft=S.leftovers.filter(l=>l.date===TODAY||l.date===YESTERDAY)
    .sort((a,b)=>b.date>a.date?1:b.date<a.date?-1:(b.time||'')>(a.time||'')?1:-1);
  if(allLeft.length){
    h+=`<div class="slbl">الفائض المسجل (${allLeft.length} عملية)</div><div class="card">`;
    allLeft.forEach(l=>{
      const pt=S.points.find(p=>p.id===l.ptId);
      const isYest=l.date===YESTERDAY;
      const lCnt=ccount(l.items);
      h+=`<div class="ditem${lCnt===0?' ditem-zeroed':''}">
        <div class="ditem-top">
          <div>
            <div style="font-size:15px;font-weight:700">${pt?pt.name:'?'}</div>
            <div style="font-size:12px;color:${isYest?'#D85A30':'var(--T)'}">
              ${isYest?`📅 أمس`:`📅 اليوم`} · ${getReason(l)}${l.time?` · ${l.time}`:''}
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:6px">
            <span class="bdg ${isYest?'bdg-r':'bdg-t'}">${lCnt} خبزة</span>
            <button class="edit-btn" onclick="openEditLeftById('${l.id||''}','${l.ptId}')">✏️</button>
          </div>
        </div>
        <div class="ditem-counts">${dcounts(l.items)}</div>
      </div>`;
    });
    h+=`</div>`;
  }
  return h;
}

function getReason(l){
  const t=l.lType||'yesterday';
  if(t==='yesterday')return'📅 الخبز البارد';
  if(t==='swap')return'🔄 استبدال';
  if(t==='transfer')return'➡️ نقل';
  return'📦 فائض';
}

function submitLeft(){
  const ptId=DF.lPtId;
  let lType=DF.lType||'yesterday';
  const items=ei();
  TK.forEach(k=>{const inp=document.getElementById('tc-'+k);if(inp)items[k]=inp.value||'0';});
  if(!ptId){toast('اختر نقطة بيع','e');return;}
  if(!hasI(items)){toast('أدخل كمية الفائض','e');return;}

  // ── منطق الدين الذكي مع تنبيه ──
  if(lType==='yesterday'){
    const currentDebt=ptOldDebt(ptId); // ديون الأيام السابقة فقط
    if(currentDebt<=0){
      // لا دين — اعرض تنبيهاً قبل التنفيذ
      _showNoDebtWarning(ptId,items,lType);
      return;
    }
    // يوجد دين → يُطرح من أمس مباشرة
    _doSaveLeft(ptId,YESTERDAY,'yesterday',items);
  }else{
    _doSaveLeft(ptId,TODAY,lType,items);
  }
}

function _showNoDebtWarning(ptId,items,lType){
  const pt=S.points.find(p=>p.id===ptId);
  const cnt=ccount(items);
  const val=cval(items,ptId);
  const ov=document.createElement('div');ov.className='modal-overlay';ov.id='pm';ov.onclick=closeModal;
  ov.innerHTML=`<div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div style="text-align:center;padding:8px 0 16px">
      <div style="font-size:48px;margin-bottom:12px">⚠️</div>
      <div style="font-size:18px;font-weight:900;color:var(--tx);margin-bottom:8px">هذه النقطة لا دين عليها</div>
      <div style="font-size:14px;color:var(--tx2);margin-bottom:20px">
        ${pt?pt.name:''} — مصفَّاة بالكامل
      </div>
    </div>
    <div class="alrt alrt-w" style="margin-bottom:16px;font-size:15px">
      الفائض سيُطرح من <strong>اليوم الجاري</strong> وليس من أمس
      <div style="margin-top:6px;font-size:13px;color:var(--AD)">
        ${cnt} خبزة · ${val.toFixed(2)} د.م ← مطروحة من ${dl(TODAY)}
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <button class="btn btn-s" style="font-size:16px" onclick="closeModal()">
        ← تغيير
      </button>
      <button class="btn btn-p" style="font-size:16px" onclick="closeModal();_doSaveLeft('${ptId}','${TODAY}','swap',null)">
        ✓ موافق
      </button>
    </div>
  </div>`;
  // حفظ الكميات مؤقتاً لاستخدامها عند الموافقة
  window._pendingLeftItems={ptId,items,lType};
  document.body.appendChild(ov);
}

function _doSaveLeft(ptId,targetDate,lType,items){
  // إذا استُدعيت من زر الموافقة — خذ الكميات المحفوظة
  if(!items&&window._pendingLeftItems&&window._pendingLeftItems.ptId===ptId){
    items=window._pendingLeftItems.items;
    window._pendingLeftItems=null;
  }
  if(!items||!hasI(items)){toast('خطأ في الكميات','e');return;}
  S.leftovers.push({id:Date.now()+'',ptId,date:targetDate,time:nstr(),items,lType});
  const cnt=ccount(items);const val=cval(items,ptId);
  const pt=S.points.find(p=>p.id===ptId);
  const todayDelivs=S.deliveries.filter(d=>d.ptId===ptId&&d.date===TODAY);
  const delivCnt=todayDelivs.reduce((s,d)=>s+ccount(d.items),0);
  const delivVal=todayDelivs.reduce((s,d)=>s+cval(d.items,ptId),0);
  AFTER_LEFT={ptId,ptName:pt?pt.name:'?',lType,cnt,val,delivCnt,delivVal};
  DF={...DF,lItems:ei(),leftMode:false,lType:'yesterday'};
  save();autoSync();
  renderDeliv();scrollTop();
}
function setMode(b){DF.leftMode=b;DF.lType='yesterday';if(b&&DF.ptId)DF.lPtId=DF.ptId;if(b)_hideSubmitBtn();renderDeliv();}

// ─── كتيب جهات الاتصال ───────────────────────
async function pickContact(inputId){
  const inp=document.getElementById(inputId);if(!inp)return;
  if('contacts' in navigator && 'ContactsManager' in window){
    try{
      const contacts=await navigator.contacts.select(['tel'],{multiple:false});
      if(contacts.length&&contacts[0].tel?.length){
        inp.value=contacts[0].tel[0];
        inp.dispatchEvent(new Event('input'));
      }
    }catch(e){inp.focus();}
  }else{
    // المتصفح لا يدعم API — الكتابة اليدوية
    inp.focus();
    toast('اكتب الرقم يدوياً أو افتح جهات الاتصال','s');
  }
}
// حذف فائض بالـ ID
function delLeftById(id){S.leftovers=S.leftovers.filter(l=>l.id!==id);save();autoSync();renderPtDetail();}
// للتوافق مع الكود القديم
function delLeft(ptId,date){S.leftovers=S.leftovers.filter(l=>!(l.ptId===ptId&&l.date===date));save();autoSync();render();}

// ─── السحب والإفلات للترتيب (Desktop) ─────────────
let _dragId=null;
function dragStart(e,id){_dragId=id;e.currentTarget.classList.add('dragging');e.dataTransfer.effectAllowed='move';}
function dragOver(e,id){e.preventDefault();if(id===_dragId)return;document.querySelectorAll('.pt-list-item').forEach(el=>el.classList.remove('drag-over'));document.getElementById('pli-'+id)?.classList.add('drag-over');}
function dragEnd(e){e.currentTarget.classList.remove('dragging');document.querySelectorAll('.pt-list-item').forEach(el=>el.classList.remove('drag-over'));}
function dropPt(e,targetId){
  e.preventDefault();
  if(!_dragId||_dragId===targetId)return;
  const fromIdx=S.points.findIndex(p=>p.id===_dragId);
  const toIdx=S.points.findIndex(p=>p.id===targetId);
  if(fromIdx<0||toIdx<0)return;
  const moved=S.points.splice(fromIdx,1)[0];
  S.points.splice(toIdx,0,moved);
  _dragId=null;save();autoSync();renderPts();renderDeliv();
}

// ─── السحب اللمسي للترتيب (Mobile) ─────────────────
let _touchId=null,_touchClone=null,_touchOriginIdx=-1;
function touchStart(e,id){
  if(!e.target.classList.contains('drag-handle'))return;
  e.preventDefault();
  _touchId=id;_touchOriginIdx=S.points.findIndex(p=>p.id===id);
  const el=document.getElementById('pli-'+id);
  const rect=el.getBoundingClientRect();
  _touchClone=el.cloneNode(true);
  Object.assign(_touchClone.style,{position:'fixed',top:rect.top+'px',left:rect.left+'px',
    width:rect.width+'px',opacity:'.85',zIndex:'999',pointerEvents:'none',
    background:'var(--AL)',border:'2px solid var(--A)',borderRadius:'12px'});
  document.body.appendChild(_touchClone);
  el.classList.add('dragging');
}
function touchMove(e){
  if(!_touchId||!_touchClone)return;
  e.preventDefault();
  const t=e.touches[0];
  _touchClone.style.top=(t.clientY-30)+'px';
  // تحديد العنصر تحت الإصبع
  _touchClone.style.display='none';
  const under=document.elementFromPoint(t.clientX,t.clientY);
  _touchClone.style.display='';
  const overItem=under?.closest('.pt-list-item');
  document.querySelectorAll('.pt-list-item').forEach(el=>el.classList.remove('drag-over'));
  if(overItem&&overItem.id!=='pli-'+_touchId)overItem.classList.add('drag-over');
}
function touchEnd(e,id){
  if(!_touchId)return;
  _touchClone?.remove();_touchClone=null;
  document.querySelectorAll('.pt-list-item').forEach(el=>{el.classList.remove('dragging','drag-over');});
  const over=document.querySelector('.pt-list-item.drag-over');
  if(over){
    const targetId=over.id.replace('pli-','');
    if(targetId&&targetId!==_touchId){
      const fromIdx=S.points.findIndex(p=>p.id===_touchId);
      const toIdx=S.points.findIndex(p=>p.id===targetId);
      if(fromIdx>=0&&toIdx>=0){const m=S.points.splice(fromIdx,1)[0];S.points.splice(toIdx,0,m);}
      save();autoSync();
    }
  }
  _touchId=null;renderPts();renderDeliv();
}

        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">

//  حذف بنقرتين — الأولى تحول الزر أحمر، الثانية تنفذ

let _delTimers={};
function confirmDel(btnEl,action,key){
  if(_delTimers[key]){
    // النقرة الثانية — نفّذ الحذف
    clearTimeout(_delTimers[key]);delete _delTimers[key];
    action();
  }else{
    // النقرة الأولى — حوّل للأحمر
    btnEl.classList.add('confirm');
    btnEl.textContent='تأكيد ✕';
    _delTimers[key]=setTimeout(()=>{

// فتح نموذج تعديل الفائض مباشرة لنقطة محددة
function openEditLeftModal(ptId){
  const pt=S.points.find(p=>p.id===ptId);if(!pt)return;
  const pr=gpr(ptId);

  // جلب الفوائض الحالية لهذه النقطة
  const existing=S.leftovers.filter(l=>l.ptId===ptId);
  // إذا يوجد فائض واحد — افتح تعديله مباشرة
  // إذا يوجد أكثر — اعرض قائمة للاختيار
  if(existing.length===0){
    // لا يوجد فائض — إنشاء جديد
    _openLeftEditor(ptId,null);
  } else if(existing.length===1){
    _openLeftEditor(ptId,existing[0]);
  } else {
    // اختيار أي فائض يريد تعديله
    const ov=document.createElement('div');ov.className='modal-overlay';ov.id='pm';ov.onclick=closeModal;
    let rows='';
    existing.forEach(lf=>{
      const isYest=lf.date===YESTERDAY;
      rows+=`<div class="ditem" style="cursor:pointer" onclick="closeModal();_openLeftEditor('${ptId}',null,'${lf.date}')">
        <div class="ditem-top">
          <div>
            <div style="font-size:16px;font-weight:700">${getReason(lf)}</div>
            <div style="font-size:13px;color:${isYest?'#D85A30':'var(--T)'}">
              ${isYest?`يُحتسب على أمس (${dl(lf.date)})`:`اليوم (${dl(lf.date)})`}
            </div>
          </div>
          <div style="font-size:20px;font-weight:800;color:var(--A)">${ccount(lf.items)} خبزة</div>
        </div>
        <div class="ditem-counts">${dcounts(lf.items)}</div>
      </div>`;
    });
    ov.innerHTML=`<div class="modal" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <div class="modal-title">📦 اختر الفائض للتعديل — ${pt.name}</div>

function _openLeftEditor(ptId,lf,dateOverride){
  const pt=S.points.find(p=>p.id===ptId);if(!pt)return;
  const pr=gpr(ptId);
  // إذا مُمرَّر كائن lf — استخدمه، إلا ابحث بالتاريخ
  const existing=lf||(dateOverride?S.leftovers.find(l=>l.ptId===ptId&&l.date===dateOverride):null);
  const curItems=existing?{...existing.items}:ei();
  const curType=existing?.lType||'yesterday';
  const curDate=existing?.date||YESTERDAY;
  const isNew=!existing;
  // حفظ ID السجل المُعدَّل
  window._editingLeftId=existing?.id||null;

  // حساب تسليمات اليوم المرجعي
  const refDate=curType==='yesterday'?YESTERDAY:TODAY;
  const refDelivs=S.deliveries.filter(d=>d.ptId===ptId&&d.date===refDate);
  const refCnt=refDelivs.reduce((s,d)=>s+ccount(d.items),0);

  let typeInputs='';
  TK.forEach(k=>{
    const t=TM[k];const v=parseInt(curItems[k])||0;
    typeInputs+=`<div class="fg" style="display:flex;align-items:center;gap:12px">
      <div style="font-size:28px">${t.icon}</div>
      <div style="flex:1">
        <div style="font-size:15px;font-weight:700">${t.label}</div>
        <div style="font-size:13px;color:var(--tx2)">${pr[k].toFixed(2)} د.م / خبزة</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <button type="button" onclick="adjEdL('${k}')" data-delta="-1"
          style="width:40px;height:48px;border-radius:8px;border:2px solid var(--br2);background:var(--bg2);font-size:24px;font-weight:800;cursor:pointer;font-family:inherit">−</button>
        <input type="number" id="el-${k}" min="0" step="1" value="${v}"
          inputmode="numeric" autocomplete="off"
          style="width:75px;text-align:center;font-size:26px;font-weight:900;border:2px solid var(--br2);border-radius:8px;padding:8px 2px"
          oninput="updLeftSum()">
        <button type="button" onclick="adjEdL('${k}')" data-delta="1"
          style="width:40px;height:48px;border-radius:8px;border:2px solid var(--br2);background:var(--bg2);font-size:24px;font-weight:800;cursor:pointer;font-family:inherit">+</button>
      </div>
    </div>`;

function adjEdL(k){
  // الزر يحتوي data-delta عبر الـ event
  const btn=event.currentTarget||event.target;
  const delta=parseInt(btn.getAttribute('data-delta'))||0;
  const inp=document.getElementById('el-'+k);if(!inp)return;
  inp.value=Math.max(0,(parseInt(inp.value)||0)+delta);
  updLeftSum();
}

function updLeftSum(){
  // قراءة ptId من زر الحفظ
  const saveBtn=document.querySelector('#pm .btn-p[onclick^="saveEditLeft"]');
  const onclickStr=saveBtn?.getAttribute('onclick')||'';
  const mPt=onclickStr.match(/saveEditLeft\('([^']+)'/);
  const ptId=mPt?mPt[1]:null;
  const pr=ptId?gpr(ptId):DP;
  let cnt=0,val=0;
  TK.forEach(k=>{const q=parseInt(document.getElementById('el-'+k)?.value)||0;cnt+=q;val+=q*(pr[k]||2.5);});
  const box=document.getElementById('el-sum');if(!box)return;
  const errEl=document.getElementById('el-zero-err');
  if(errEl)errEl.style.display=cnt===0?'block':'none';
  let inner='';
  TK.forEach(k=>{const q=parseInt(document.getElementById('el-'+k)?.value)||0;
    if(q)inner+=`<div class="sum-row"><span>${TM[k].icon} ${q} ${TM[k].label}</span><span>${(q*(pr[k]||2.5)).toFixed(2)} د.م</span></div>`;
  });
  if(cnt===0)inner=`<div style="color:#D85A30;font-weight:700;font-size:14px">⚠️ الكمية = 0 — سيُعلَّم الفائض كمُلغى</div>`;
  else inner+=`<div class="sum-row sum-total"><span>إجمالي الفائض</span><span>${cnt} خبزة · ${val.toFixed(2)} د.م</span></div>`;
  box.innerHTML=inner;
}

function saveEditLeft(ptId,oldDate){
  const lType=document.getElementById('el-ltype')?.value||'yesterday';
  const items=ei();
  TK.forEach(k=>{items[k]=document.getElementById('el-'+k)?.value||'0';});
  const cnt=ccount(items);
  const notePrivate=(document.getElementById('el-note-priv')?.value||'').trim();
  const notePublic=(document.getElementById('el-note-pub')?.value||'').trim();
  // إذا الكمية 0 يجب ملاحظة
  if(cnt===0&&!notePrivate&&!notePublic){
    const errEl=document.getElementById('el-zero-err');
    if(errEl)errEl.style.display='block';
    toast('يجب كتابة سبب التصفير في الملاحظة','e');
    return;
  }
  const targetDate=lType==='yesterday'?YESTERDAY:TODAY;
  // عدّل بالـ ID إن وجد، وإلا أضف جديداً
  const editingId=window._editingLeftId;
  if(editingId){
    const idx=S.leftovers.findIndex(l=>l.id===editingId);
    if(idx>=0) S.leftovers[idx]={...S.leftovers[idx],date:targetDate,items,lType,notePrivate,notePublic};
    window._editingLeftId=null;
  }else{
    S.leftovers.push({id:Date.now()+'',ptId,date:targetDate,time:nstr(),items,lType,notePrivate,notePublic});
  }
  save();autoSync();closeModal();
  toast(`✓ تم تعديل الفائض — ${cnt} خبزة`);
  renderPtDetail();
}

function settleAll(){
  const pts=S.points.filter(p=>{const stl=calcSettlement(p.id);return stl&&stl.totalNetCount>0;});
  if(!pts.length){toast('لا توجد نقاط للتخليص','e');return;}
  if(!confirm(`تأكيد تخليص جميع نقاط البيع (${pts.length} نقطة) كاملاً؟`))return;
  const base=Date.now();
  pts.forEach((pt,i)=>{
    const stl=calcSettlement(pt.id);if(!stl)return;
    S.settlements.push({
      id:(base+i)+'',ptId:pt.id,date:TODAY,dateFrom:stl.periodStart,dateTo:stl.periodEnd,
      type:'full',paid:stl.totalNet,totalNet:stl.totalNet,
      totalDelivCount:stl.totalDelivCount,totalLeftCount:stl.totalLeftCount,totalNetCount:stl.totalNetCount,
      delivered:stl.delivered,leftover:stl.leftover,
      archivedDeliveries:stl.delivsInPeriod.map(d=>({...d}))
    });
  });
  save();autoSync();toast(`✓ تم تخليص ${pts.length} نقطة بيع`);render();
}

function openSettleModal(ptId){

  let dayRows='';

    const dayLefts=S.leftovers.filter(l=>l.ptId===ptId&&l.date===date);

    const typesStr=TK.filter(k=>{const n=(parseInt(dayDeliv[k])||0)-(parseInt(dayLeft[k])||0);return n>0;})
      .map(k=>`${TM[k].icon}${Math.max(0,(parseInt(dayDeliv[k])||0)-(parseInt(dayLeft[k])||0))}`).join(' ');
    dayRows+=`<div class="day-row selected" id="dr-${date}" onclick="toggleDay('${date}',${dayVal},${dayCnt},'${ptId}')">

    <div class="settle-remaining" style="margin-bottom:14px">
      <div class="settle-remaining-lbl">⚠️ رصيد متبقٍ من تخليصات سابقة</div>
      <div class="settle-remaining-val">${prevRem.toFixed(2)} د.م</div>
    </div>`:' ';

  ov.innerHTML=`<div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-title">💵 تخليص — ${pt.name}</div>

    ${prevRemHtml}

    <div class="slbl">اختر الأيام للتخليص</div>
    <div style="display:flex;gap:10px;margin-bottom:12px">
      <button class="btn btn-s btn-sm" onclick="selectAllDays('${ptId}',true)" style="flex:1">✓ تحديد الكل</button>
      <button class="btn btn-s btn-sm" onclick="selectAllDays('${ptId}',false)" style="flex:1">✗ إلغاء الكل</button>
    </div>

    <div id="days-list">${dayRows}</div>

    <div class="settle-live-total" id="settle-live">
      <div style="font-size:13px;color:var(--tx2);margin-bottom:6px;font-weight:700">إجمالي الأيام المختارة</div>
      <div class="settle-live-count" id="live-count">${stl.totalNetCount}</div>
      <div class="settle-live-dh">خبزة — <span id="live-dh">${stl.totalNet.toFixed(2)}</span> د.م</div>
    </div>

    <div class="slbl">نوع الدفع</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
      <div class="mode-btn on" id="stp-full" onclick="setSettleType('full','${ptId}')">💯<br>دفع كامل</div>
      <div class="mode-btn" id="stp-partial" onclick="setSettleType('partial','${ptId}')">💸<br>دفع جزئي</div>
    </div>

    <div id="partial-input" style="display:none" class="fg">
      <label class="fl">المبلغ المدفوع فعلياً (درهم)</label>
      <input type="number" id="settle-paid-input" min="0" step="0.5" placeholder="0.00"
        oninput="updSettleBalance('${ptId}')">
      <div id="settle-balance-row" style="margin-top:10px;padding:12px 16px;background:#FAECE7;border-radius:var(--r);display:none">
        <div style="font-size:14px;color:#993C1D;font-weight:700">الرصيد المتبقي (يُضاف للدين):</div>
        <div style="font-size:26px;font-weight:800;color:#D85A30;margin-top:3px"><span id="settle-balance-val">0.00</span> د.م</div>
      </div>
    </div>

    <input type="hidden" id="settle-type-val" value="full">

    <button class="btn btn-teal" style="margin-top:10px;font-size:18px" id="confirm-settle-btn" onclick="previewSettle('${ptId}')">
      🔍 مراجعة والتأكيد
    </button>
    <button class="btn btn-s" style="margin-top:10px" onclick="closeModal()">إلغاء</button>
  </div>`;
