function toggleDay(date,val,cnt,ptId){
  const cb=document.getElementById('cb-'+date);
  const row=document.getElementById('dr-'+date);
  const sel=window._settleState.selectedDates;
  if(sel.has(date)){sel.delete(date);row.classList.remove('selected');cb.checked=false;}
  else{sel.add(date);row.classList.add('selected');cb.checked=true;}
  updSettleLive();
}
function selectAllDays(ptId,selectAll){
  const stl=calcSettlement(ptId);if(!stl)return;
  window._settleState.selectedDates=selectAll?new Set(stl.days.map(([d])=>d)):new Set();
  stl.days.forEach(([date])=>{
    const cb=document.getElementById('cb-'+date);const row=document.getElementById('dr-'+date);
    if(cb){cb.checked=selectAll;}if(row){row.classList.toggle('selected',selectAll);}
  });
  updSettleLive();
}
function updSettleLive(){
  const {ptId,selectedDates,type}=window._settleState||{};
  if(!ptId)return;
  const {cnt,val}=calcForDays(ptId,[...selectedDates]);
  document.getElementById('live-count').textContent=cnt;
  document.getElementById('live-dh').textContent=val.toFixed(2);
  // تحديث زر التأكيد
  const btn=document.getElementById('confirm-settle-btn');
  if(btn){
    const nSel=selectedDates.size;
    btn.textContent=nSel===0?'اختر يوماً أولاً':'🔍 مراجعة والتأكيد';
    btn.disabled=nSel===0;
    btn.style.opacity=nSel===0?'0.5':'1';
  }
  if(type==='partial')updSettleBalance(ptId);
}
function setSettleType(type,ptId){
  window._settleState.type=type;
  document.getElementById('stp-full')?.classList.toggle('on',type==='full');
  document.getElementById('stp-partial')?.classList.toggle('on',type==='partial');
  document.getElementById('partial-input').style.display=type==='partial'?'block':'none';
  document.getElementById('settle-type-val').value=type;
  if(type==='full'){document.getElementById('settle-balance-row').style.display='none';}
  updSettleLive();
}
function updSettleBalance(ptId){
  const {cnt,val}=calcForDays(ptId,[...window._settleState.selectedDates]);
  const paid=parseFloat(document.getElementById('settle-paid-input')?.value)||0;
  const rem=val-paid;
  const row=document.getElementById('settle-balance-row');const balVal=document.getElementById('settle-balance-val');
  if(row&&balVal){
    if(rem>0.01){row.style.display='block';balVal.textContent=rem.toFixed(2);}
    else{row.style.display='none';}
  }
}
function previewSettle(ptId){
  const {selectedDates,type}=window._settleState||{};
  if(!selectedDates||selectedDates.size===0){toast('اختر يوماً واحداً على الأقل','e');return;}
  const {cnt,val}=calcForDays(ptId,[...selectedDates]);
  if(cnt===0){toast('لا يوجد خبز مخلَّص في الأيام المختارة','e');return;}

  const type2=document.getElementById('settle-type-val')?.value||'full';
  let paid=val;let remaining=0;
  if(type2==='partial'){
    paid=parseFloat(document.getElementById('settle-paid-input')?.value)||0;
    if(paid<=0){toast('أدخل المبلغ المدفوع','e');return;}

function confirmSettle(ptId){
  const {selectedDates,type}=window._settleState||{};
  if(!selectedDates||selectedDates.size===0){toast('اختر يوماً واحداً على الأقل','e');return;}
  const {cnt,val,delivIds,delivs}=calcForDays(ptId,[...selectedDates]);
  if(cnt===0){toast('لا يوجد خبز مخلَّص في الأيام المختارة','e');return;}
  const type2=document.getElementById('settle-type-val')?.value||'full';
  let paid=val;let remaining=0;
  if(type2==='partial'){
    paid=parseFloat(document.getElementById('settle-paid-input')?.value)||0;
    if(paid<=0){toast('أدخل المبلغ المدفوع','e');return;}
    if(paid>val){toast(`المبلغ لا يمكن أن يتجاوز ${val.toFixed(2)} د.م`,'e');return;}
    paid=Math.min(paid,val);
    remaining=parseFloat((val-paid).toFixed(2));
  }
  const selDates=[...selectedDates].sort();
  // تجميع التسليمات المختارة للأرشيف
  const archivedDeliveries=delivs.map(d=>({...d}));
  S.settlements.push({
    id:Date.now()+'',ptId,
    date:TODAY,
    dateFrom:selDates[0],dateTo:selDates[selDates.length-1],
    type:type2,paid,totalNet:val,remainingBalance:remaining,
    settledDeliveryIds:delivIds, // ← المفتاح — تتبع التسليمات المخلَّصة
    totalDelivCount:delivs.reduce((s,d)=>s+ccount(d.items),0),
    totalLeftCount:S.leftovers.filter(l=>l.ptId===ptId&&selectedDates.has(l.date)).reduce((s,l)=>s+ccount(l.items),0),
    totalNetCount:cnt,
    archivedDeliveries
  });
  save();autoSync();closeModal();
  const remMsg=remaining>0?` · رصيد متبقٍ: ${remaining.toFixed(2)} د.م`:'';
  toast(`✓ ${cnt} خبزة — ${paid.toFixed(2)} د.م${remMsg}`);
  renderPtDetail();
}
function closeModal(){document.getElementById('pm')?.remove();window._settleState=null;}

function renderStats(){
  if(!S.points.length){document.getElementById('scr-stats').innerHTML=`<div class="empty"><div class="empty-icon">📊</div>أضف نقاط بيع وسجل توزيعات</div>`;return;}

  // ── فلتر الموزع ──
  const allDrivers=[...new Set(S.deliveries.map(d=>d.driver).filter(Boolean))];
  const selDriver=window._statsDriver||'all';
  const filteredDelivs=selDriver==='all'?S.deliveries:S.deliveries.filter(d=>d.driver===selDriver);

  let h=``;
  if(allDrivers.length>1||SESSION.role==='manager'){
    h+=`<div class="slbl">👤 عرض حسب الموزع</div>
    <div class="driver-filter">
      <button class="driver-pill ${selDriver==='all'?'on':''}" onclick="window._statsDriver='all';renderStats()">الكل</button>
      ${allDrivers.map(d=>`<button class="driver-pill ${selDriver===d?'on':''}" onclick="window._statsDriver='${d}';renderStats()">${d}</button>`).join('')}
    </div>`;
  }

  const allDates=[...new Set(filteredDelivs.map(d=>d.date))].sort().reverse().slice(0,10);
  const byPt=S.points.map(pt=>{
    const cnt=filteredDelivs.filter(d=>d.ptId===pt.id).reduce((s,d)=>s+ccount(d.items),0)
             -S.leftovers.filter(l=>l.ptId===pt.id).reduce((s,l)=>s+ccount(l.items),0);
    const val=filteredDelivs.filter(d=>d.ptId===pt.id).reduce((s,d)=>s+cval(d.items,pt.id),0)
             -S.leftovers.filter(l=>l.ptId===pt.id).reduce((s,l)=>s+cval(l.items,pt.id),0);
    return{pt,cnt:Math.max(0,cnt),val:Math.max(0,val),debt:ptDebt(pt.id)};
  }).sort((a,b)=>b.cnt-a.cnt);
  const mx=Math.max(...byPt.map(x=>x.cnt),1);
  const typeTot={}; TK.forEach(k=>typeTot[k]=0);
  filteredDelivs.forEach(d=>TK.forEach(k=>{typeTot[k]+=(parseInt(d.items[k])||0)}));
  const lftTot={}; TK.forEach(k=>lftTot[k]=0);
  S.leftovers.forEach(l=>TK.forEach(k=>{lftTot[k]+=(parseInt(l.items[k])||0)}));
  const totalDebt=S.points.reduce((s,pt)=>s+ptDebt(pt.id),0);
  const totalPaid=S.settlements.reduce((s,st)=>s+st.paid,0);

  h+=`<div class="mgrid">
    <div class="met"><div class="met-lbl">إجمالي الديون</div><div class="met-val" style="${totalDebt>0?'color:#D85A30':''}">${totalDebt.toFixed(2)}</div><div class="met-sub">درهم مستحق</div></div>
    <div class="met"><div class="met-lbl">إجمالي التخليص</div><div class="met-val" style="color:var(--T)">${totalPaid.toFixed(2)}</div><div class="met-sub">درهم تم تحصيله</div></div>
  </div>`;

  h+=`<div class="slbl">إجمالي حسب نوع الخبز${selDriver!=='all'?' — '+selDriver:''}</div>`;
  h+=`<div class="totals-box">`;
  TK.forEach(k=>{
    const net=typeTot[k]-lftTot[k];
    h+=`<div class="totals-row">
      <div class="totals-label">${TM[k].icon} ${TM[k].label}</div>
      <div style="display:flex;align-items:center;gap:16px">
        <div class="totals-count">${net}</div>
        <div class="totals-val">${(net*DP[k]).toFixed(2)} د.م</div>
      </div>
    </div>`;
  });
  const grandCnt=TK.reduce((s,k)=>s+typeTot[k]-lftTot[k],0);
  h+=`<div class="totals-row totals-grand">
    <div class="totals-label">🍞 المجموع الإجمالي</div>
    <div style="display:flex;align-items:center;gap:16px">
      <div class="totals-count">${grandCnt}</div>
      <div class="totals-val">${byPt.reduce((s,x)=>s+x.val,0).toFixed(2)} د.م</div>
    </div>
  </div></div>`;

  h+=`<div class="slbl">ترتيب نقاط البيع</div><div class="card">`;
  byPt.forEach(({pt,cnt,val,debt})=>{
    const bt=btTime(pt.id);
    h+=`<div style="margin-bottom:14px;cursor:pointer" onclick="viewPt('${pt.id}')">
      <div style="display:flex;justify-content:space-between;font-size:15px;margin-bottom:4px">
        <span style="font-weight:800;color:var(--A)">${pt.name}</span>
        <span style="font-weight:700">${cnt} خبزة <span style="font-weight:600;color:var(--tx2)">/ ${val.toFixed(2)} د.م</span></span>
      </div>
      <div class="btrack"><div class="bfill" style="width:${Math.round(cnt/mx*100)}%"></div></div>
      <div style="display:flex;justify-content:space-between;margin-top:4px">
        ${bt?`<span style="font-size:13px;color:var(--A);font-weight:600">⏰ أنسب وقت: ${bt}</span>`:'<span></span>'}
        <span style="font-size:13px;color:${debt>0?'#D85A30':'var(--T)'};font-weight:700">${debt>0?'دين: '+debt.toFixed(2)+' د.م':'✓ مصفى'}</span>
      </div>
    </div>`;
  });
  h+=`</div>`;

  // ── الملخص الأسبوعي ──
  const allDatesAll=[...new Set(S.deliveries.map(d=>d.date))].sort();
  if(allDatesAll.length>3){
    // تجميع الأيام في أسابيع (الاثنين→الأحد)
    const weeks={};
    allDatesAll.forEach(date=>{
      const d=new Date(date+'T12:00:00');
      const day=d.getDay();
      const diff=d.getDate()-(day===0?6:day-1);
      const mon=new Date(d.setDate(diff));
      const wk=mon.toISOString().split('T')[0];
      if(!weeks[wk])weeks[wk]=[];
      weeks[wk].push(date);
    });
    const wkKeys=Object.keys(weeks).sort().reverse();
    if(wkKeys.length){
      h+=`<div class="slbl">ملخص أسبوعي</div>`;
      wkKeys.forEach(wk=>{
        const wkDates=weeks[wk];
        const wkDelivs=filteredDelivs.filter(d=>wkDates.includes(d.date));
        const wkLfts=S.leftovers.filter(l=>wkDates.includes(l.date));
        const wkTotal=wkDelivs.reduce((s,d)=>s+ccount(d.items),0);
        const wkLft=wkLfts.reduce((s,l)=>s+ccount(l.items),0);
        const wkNet=wkTotal-wkLft;
        const wkVal=wkDelivs.reduce((s,d)=>s+cval(d.items,d.ptId),0)-wkLfts.reduce((s,l)=>s+cval(l.items,l.ptId),0);
        const wkSettled=S.settlements.filter(s=>wkDates.includes(s.date)).reduce((s,st)=>s+st.paid,0);
        const wEnd=wkDates[wkDates.length-1];
        h+=`<div class="week-block">
          <div class="week-block-head">
            <span>${dl(wkDates[0])} ← ${dl(wEnd)}</span>
            <span>${wkDates.length} يوم</span>
          </div>
          <div class="week-block-body">
            <div class="week-stat-row"><span>🚚 موزَّع</span><span class="week-stat-val">${wkTotal} خبزة</span></div>
            <div class="week-stat-row"><span>↩ مرتجع</span><span class="week-stat-val" style="color:#D85A30">${wkLft} خبزة</span></div>
            <div class="week-stat-row"><span>🍞 مباع (صافي)</span><span class="week-stat-val" style="color:var(--T)">${Math.max(0,wkNet)} خبزة · ${Math.max(0,wkVal).toFixed(2)} د.م</span></div>
            ${wkSettled>0?`<div class="week-stat-row"><span>💰 مخلَّص</span><span class="week-stat-val" style="color:var(--T)">${wkSettled.toFixed(2)} د.م</span></div>`:''}
          </div>
        </div>`;
      });
    }
  }

  if(allDates.length){
    h+=`<div class="slbl">تطور المبيعات اليومية</div><div class="card">`;
    allDates.forEach(date=>{
      const cnt=filteredDelivs.filter(d=>d.date===date).reduce((s,d)=>s+ccount(d.items),0)
               -S.leftovers.filter(l=>l.date===date).reduce((s,l)=>s+ccount(l.items),0);
      const val=filteredDelivs.filter(d=>d.date===date).reduce((s,d)=>s+cval(d.items,d.ptId),0)
               -S.leftovers.filter(l=>l.date===date).reduce((s,l)=>s+cval(l.items,l.ptId),0);
      h+=`<div class="hrow"><span style="font-size:15px;font-weight:600">${dl(date)}</span><span style="font-weight:800;color:var(--A)">${Math.max(0,cnt)} خبزة <span style="font-size:13px;font-weight:600;color:var(--tx2)">/ ${Math.max(0,val).toFixed(2)} د.م</span></span></div>`;
    });
    h+=`</div>`;
  }
  document.getElementById('scr-stats').innerHTML=h;
}

// ─── مشاركة النسخة الاحتياطية عبر واتساب / تيليغرام / ميسنجر ─────
async function shareBackup(){
  const json=dataForSync();
  const fileName='محسين_نسخة_احتياطية_'+TODAY+'.json';

  // حاول Web Share API (مدعوم على الهواتف)
  if(navigator.share){
    try{
      // إنشاء File object قابل للمشاركة
      const blob=new Blob([json],{type:'application/json'});
      const file=new File([blob],fileName,{type:'application/json'});

      // تحقق من دعم مشاركة الملفات
      if(navigator.canShare&&navigator.canShare({files:[file]})){
        await navigator.share({
          title:'محسين — نسخة احتياطية '+TODAY,
          text:'ملف النسخ الاحتياطي لمحسين للخبز التقليدي — استورده من الإعدادات',
          files:[file]
        });
        toast('✓ تمت المشاركة بنجاح');
        return;
      }

      // مشاركة النص مباشرة إن لم تُدعم الملفات
      await navigator.share({
        title:'محسين — نسخة احتياطية '+TODAY,
        text:json
      });
      toast('✓ تمت المشاركة بنجاح');
      return;
    }catch(err){
      if(err.name==='AbortError')return; // المستخدم أغلق القائمة
    }
  }

  // Fallback: تحميل الملف + نص توضيحي
  toast('المشاركة المباشرة غير مدعومة — سيُحمَّل الملف','s');
  setTimeout(()=>{
    const a=document.createElement('a');
    a.href='data:application/json,'+encodeURIComponent(json);
    a.download=fileName;a.click();
  },500);
}

  // ─ ورقة التسليمات ─
  csv+='=== تسليمات الخبز ===\n';
  csv+='التاريخ,نقطة البيع,الساعة,'+TK.map(k=>TM[k].label).join(',')+',إجمالي الخبز,القيمة (د.م),المسؤول,ملاحظات\n';
  [...S.deliveries].sort((a,b)=>a.date>b.date?1:a.date<b.date?-1:a.time>b.time?1:-1).forEach(d=>{
    const pt=S.points.find(p=>p.id===d.ptId);
    const pr=gpr(d.ptId);
    const row=[
      dl(d.date),
      `"${pt?pt.name:''}"`,
      d.time,

      cval(d.items,d.ptId).toFixed(2),

    ];

  });

  csv+='\n=== الفائض / المرتجع ===\n';
  csv+='التاريخ,نقطة البيع,'+TK.map(k=>TM[k].label).join(',')+',إجمالي الفائض,القيمة (د.م)\n';
  [...S.leftovers].sort((a,b)=>a.date>b.date?1:-1).forEach(l=>{
    const pt=S.points.find(p=>p.id===l.ptId);
    const row=[
      dl(l.date),
      `"${pt?pt.name:''}"`,
      ...TK.map(k=>parseInt(l.items[k])||0),
      ccount(l.items),
      cval(l.items,l.ptId).toFixed(2)
    ];
    csv+=row.join(',')+'\n';
  });

  csv+='\n=== عمليات التخليص ===\n';
  csv+='تاريخ التخليص,نقطة البيع,من تاريخ,إلى تاريخ,النوع,المزوّد,المرتجع,الصافي,المستحق (د.م),المدفوع (د.م),الرصيد (د.م)\n';
  [...S.settlements].sort((a,b)=>a.date>b.date?1:-1).forEach(st=>{
    const pt=S.points.find(p=>p.id===st.ptId);
    const row=[
      dl(st.date),
      `"${pt?pt.name:''}"`,
      dl(st.dateFrom),
      dl(st.dateTo),
      st.type==='full'?'كامل':'جزئي',
      st.totalDelivCount,
      st.totalLeftCount,
      st.totalNetCount,
      st.totalNet.toFixed(2),
      st.paid.toFixed(2),
      (st.totalNet-st.paid).toFixed(2)
    ];
    csv+=row.join(',')+'\n';
  });

  csv+='\n=== نقاط البيع ===\n';
  csv+='الاسم,العنوان,'+TK.map(k=>'سعر '+TM[k].label+' (د.م)').join(',')+'\n';
  S.points.forEach(pt=>{
    const pr=gpr(pt.id);
    const row=[`"${pt.name}"`,`"${pt.address||''}"`, ...TK.map(k=>pr[k].toFixed(2))];
    csv+=row.join(',')+'\n';
  });

  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='محسين_'+TODAY+'.csv';a.click();
  toast('✓ تم تصدير ملف Excel');
}

let HF={period:'day',ptId:'',dateFrom:TODAY,dateTo:TODAY};

function renderHistory(){
  const sc=document.getElementById('scr-history');if(!sc)return;
  if(!S.points.length){sc.innerHTML=`<div class="empty"><div class="empty-icon">📋</div>لا توجد بيانات بعد</div>`;return;}

  // حساب نطاق التاريخ حسب الفلتر
  const now=new Date(TODAY+'T12:00:00');
  let dFrom=TODAY,dTo=TODAY;
  if(HF.period==='day'){dFrom=TODAY;dTo=TODAY;}
  else if(HF.period==='week'){const d=new Date(now);d.setDate(d.getDate()-6);dFrom=d.toISOString().split('T')[0];dTo=TODAY;}
  else if(HF.period==='month'){const d=new Date(now);d.setDate(1);dFrom=d.toISOString().split('T')[0];dTo=TODAY;}
  else if(HF.period==='custom'){dFrom=HF.dateFrom;dTo=HF.dateTo;}

  const ptFilter=HF.ptId;
  const filtDelivs=S.deliveries.filter(d=>d.date>=dFrom&&d.date<=dTo&&(!ptFilter||d.ptId===ptFilter));
  const filtLefts=S.leftovers.filter(l=>l.date>=dFrom&&l.date<=dTo&&(!ptFilter||l.ptId===ptFilter));

  // إجماليات
  const totDelivCnt=filtDelivs.reduce((s,d)=>s+ccount(d.items),0);
  const totDelivVal=filtDelivs.reduce((s,d)=>s+cval(d.items,d.ptId),0);
  const totLeftCnt=filtLefts.reduce((s,l)=>s+ccount(l.items),0);
  const totLeftVal=filtLefts.reduce((s,l)=>s+cval(l.items,l.ptId),0);
  const netCnt=totDelivCnt-totLeftCnt;const netVal=totDelivVal-totLeftVal;

  let h=``;

  // فلتر الفترة
  h+=`<div class="filter-bar">
    <button class="fpill ${HF.period==='day'?'on':''}" onclick="HF.period='day';renderHistory()">📅 اليوم</button>
    <button class="fpill ${HF.period==='week'?'on':''}" onclick="HF.period='week';renderHistory()">📆 الأسبوع</button>
    <button class="fpill ${HF.period==='month'?'on':''}" onclick="HF.period='month';renderHistory()">🗓️ الشهر</button>
    <button class="fpill ${HF.period==='custom'?'on':''}" onclick="HF.period='custom';renderHistory()">🔎 نطاق</button>
  </div>`;

  if(HF.period==='custom'){
    h+=`<div class="card-flat" style="margin-bottom:12px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="fg"><label class="fl">من</label><input type="date" value="${HF.dateFrom}" oninput="HF.dateFrom=this.value;renderHistory()"></div>
        <div class="fg"><label class="fl">إلى</label><input type="date" value="${HF.dateTo}" oninput="HF.dateTo=this.value;renderHistory()"></div>
      </div>
    </div>`;
  }

  // فلتر نقطة البيع
  h+=`<div class="fg" style="margin-bottom:14px"><label class="fl">نقطة البيع</label>
    <select onchange="HF.ptId=this.value;renderHistory()">
      <option value="">📍 جميع النقاط</option>
      ${S.points.map(p=>`<option value="${p.id}" ${HF.ptId===p.id?'selected':''}>${p.name}</option>`).join('')}
    </select></div>`;

  // بطاقة الملخص
  h+=`<div class="mgrid" style="margin-bottom:14px">
    <div class="met"><div class="met-lbl">إجمالي الخبز</div><div class="met-val">${totDelivCnt}</div><div class="met-sub">${totDelivVal.toFixed(2)} د.م</div></div>
    <div class="met"><div class="met-lbl">صافي المبيعات</div><div class="met-val" style="color:var(--T)">${Math.max(0,netCnt)}</div><div class="met-sub">${Math.max(0,netVal).toFixed(2)} د.م</div></div>
    <div class="met"><div class="met-lbl">الفائض / المرتجع</div><div class="met-val" style="color:#D85A30">${totLeftCnt}</div><div class="met-sub">${totLeftVal.toFixed(2)} د.م</div></div>
    <div class="met"><div class="met-lbl">عدد التسليمات</div><div class="met-val">${filtDelivs.length}</div><div class="met-sub">${[...new Set(filtDelivs.map(d=>d.ptId))].length} نقطة</div></div>
  </div>`;

  // أزرار الطباعة والتصدير
  h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
    <button class="btn btn-s" onclick="printReport('${ptFilter}','${dFrom}','${dTo}')">🖨️ طباعة</button>
    <button class="btn btn-s" style="background:var(--GL);color:var(--GD);border-color:var(--GD)" onclick="exportExcelFiltered('${ptFilter}','${dFrom}','${dTo}')">📊 Excel</button>
  </div>`;

  // تفاصيل حسب اليوم
  const days=[...new Set(filtDelivs.map(d=>d.date))].sort().reverse();
  if(!days.length){h+=`<div class="empty"><div class="empty-icon">📭</div>لا توجد تسليمات في هذه الفترة</div>`;}
  else{
    // إجمالي حسب نقطة البيع (إذا "كل النقاط")
    if(!ptFilter){
      h+=`<div class="slbl">إجمالي حسب نقطة البيع</div><div class="card">`;
      S.points.forEach(pt=>{
        const pds=filtDelivs.filter(d=>d.ptId===pt.id);
        if(!pds.length)return;
        const pCnt=pds.reduce((s,d)=>s+ccount(d.items),0);
        const pVal=pds.reduce((s,d)=>s+cval(d.items,pt.id),0);
        const pLeft=filtLefts.filter(l=>l.ptId===pt.id).reduce((s,l)=>s+ccount(l.items),0);
        const pLeftVal=filtLefts.filter(l=>l.ptId===pt.id).reduce((s,l)=>s+cval(l.items,pt.id),0);
        h+=`<div style="padding:10px 0;border-bottom:1px solid var(--br);display:flex;justify-content:space-between;align-items:center">
          <div style="font-weight:800;font-size:16px;color:var(--A)">${pt.name}</div>
          <div style="text-align:left">
            <div style="font-size:17px;font-weight:800">${pCnt-pLeft} خبزة</div>
            <div style="font-size:13px;color:var(--tx2)">${(pVal-pLeftVal).toFixed(2)} د.م</div>
          </div>
        </div>`;
      });
      h+=`</div>`;
    }

    // تفاصيل يومية
    h+=`<div class="slbl">تفاصيل التسليمات</div>`;
    days.forEach(date=>{
      const dayDelivs=filtDelivs.filter(d=>d.date===date).sort((a,b)=>a.time>b.time?1:-1);
      const dayLeft=filtLefts.filter(l=>l.date===date);
      const dayCnt=dayDelivs.reduce((s,d)=>s+ccount(d.items),0);
      const dayVal=dayDelivs.reduce((s,d)=>s+cval(d.items,d.ptId),0);
      const dayLeftCnt=dayLeft.reduce((s,l)=>s+ccount(l.items),0);
      h+=`<div class="card" style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid var(--br)">
          <div style="font-size:16px;font-weight:800">${dl(date)} · ${fdate(date).split(' ')[0]}</div>
          <div style="text-align:left">
            <div style="font-size:17px;font-weight:800;color:var(--A)">${dayCnt-dayLeftCnt} خبزة</div>
            <div style="font-size:13px;color:var(--tx2)">${(dayVal).toFixed(2)} د.م موزع</div>
          </div>
        </div>`;
      dayDelivs.forEach(d=>{
        const pt=S.points.find(p=>p.id===d.ptId);
        h+=`<div class="hist-entry">
          <div class="hist-entry-head">
            <div style="font-size:15px;font-weight:800;color:var(--A)">${d.time} · ${pt?pt.name:'?'}</div>
            <div style="font-size:15px;font-weight:700">${ccount(d.items)} خبزة · ${cval(d.items,d.ptId).toFixed(2)} د.م</div>
          </div>
          <div class="ditem-counts">${dcounts(d.items)}${d.driver?`<span style="font-size:13px;color:var(--tx2);margin-right:4px">· 👤 ${d.driver}</span>`:''}</div>
        </div>`;
      });
      if(dayLeft.length){
        dayLeft.forEach(l=>{
          const pt=S.points.find(p=>p.id===l.ptId);
          h+=`<div class="hist-entry">
            <div class="hist-entry-head">
              <div style="font-size:14px;font-weight:700;color:#D85A30">📦 فائض — ${pt?pt.name:'?'}</div>
              <div style="font-size:14px;font-weight:700;color:#D85A30">${ccount(l.items)} مرتجع</div>
            </div>
            <div class="ditem-counts">${dcounts(l.items)}</div>
          </div>`;
        });
      }
      h+=`</div>`;
    });
  }
  sc.innerHTML=h;
}

  <div class="summary">
    <div class="sm"><div class="sm-v">${totDelivCnt}</div><div class="sm-l">إجمالي الخبز الموزع</div></div>

  <table>
    <thead><tr><th>التاريخ</th><th>الساعة</th><th>نقطة البيع</th><th>التفاصيل</th><th>الكمية</th><th>القيمة (د.م)</th><th>المسؤول</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>
  <div class="footer">محسين للخبز التقليدي · تقرير تلقائي</div>
  <script>window.onload=()=>{window.print();}<\/script>
  </body></html>`);
  w.document.close();
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
// ═══════════════════════════════════════════════
//  PIN SYSTEM — نظام الصلاحيات
// ═══════════════════════════════════════════════
let _pinBuffer='';

function showPinScreen(){
  const sc=document.getElementById('pin-screen');
  sc.style.display='flex';
  _renderPinStep1();
}
function hidePinScreen(){
  document.getElementById('pin-screen').style.display='none';
}

function _renderPinStep1(){
  _pinBuffer='';
  const hasPin=CFG.managerPin&&CFG.managerPin.length>=4;
  const sc=document.getElementById('pin-screen');
  sc.innerHTML=`
    <div style="font-size:60px;margin-bottom:16px">🍞</div>
    <div class="pin-title">محسين للخبز التقليدي</div>
    <div class="pin-sub">من أنت؟</div>
    <div class="pin-grid">
      <div class="pin-role-btn manager" onclick="_pinSelectManager()">
        <div class="pin-role-btn-icon">👑</div>
        <div class="pin-role-btn-name">محسين</div>
        <div class="pin-role-btn-sub">${hasPin?'يحتاج PIN':'كل الصلاحيات'}</div>
      </div>
      <div class="pin-role-btn" onclick="_pinSelectDriver()">
        <div class="pin-role-btn-icon">🚚</div>
        <div class="pin-role-btn-name">موزع</div>
        <div class="pin-role-btn-sub">يرى تسليماته فقط</div>
      </div>
    </div>`;
}

function _pinSelectManager(){
  if(!CFG.managerPin||CFG.managerPin.length<4){
    // لا يوجد PIN — دخول مباشر
    SESSION={role:'manager',driverName:''};
    hidePinScreen();render();return;
  }
  _renderPinEntry('manager');
}

function _pinSelectDriver(){
  _renderDriverName();
}

function _renderDriverName(){
  const drivers=[...new Set(S.deliveries.map(d=>d.driver).filter(Boolean))];
  const sc=document.getElementById('pin-screen');
  sc.innerHTML=`
    <button onclick="_renderPinStep1()" style="position:absolute;top:20px;right:20px;background:none;border:none;font-size:22px;cursor:pointer;color:var(--tx2)">←</button>
    <div style="font-size:44px;margin-bottom:16px">🚚</div>
    <div class="pin-title">ادخل اسمك</div>
    <div class="pin-sub">سيظهر فقط ما تم توزيعه باسمك</div>
    <div style="width:100%;max-width:320px;margin-bottom:16px">
      <input type="text" id="pin-driver-name" placeholder="اسم الموزع" autocomplete="off"
        style="font-size:20px;font-weight:700;text-align:center;padding:16px;border-radius:var(--r);border:2.5px solid var(--A);background:var(--bg);color:var(--tx);width:100%;font-family:inherit"
        oninput="this.value=this.value" list="pin-drv-list">
      <datalist id="pin-drv-list">${drivers.map(d=>`<option value="${d}">`).join('')}</datalist>
    </div>
    ${drivers.length?`<div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:16px;max-width:320px">
      ${drivers.map(d=>`<button onclick="document.getElementById('pin-driver-name').value='${d}'" 
        style="padding:8px 14px;border-radius:20px;border:2px solid var(--br2);background:var(--bg2);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit">${d}</button>`).join('')}
    </div>`:''}
    <button class="btn btn-p" style="max-width:320px;font-size:17px" onclick="_confirmDriver()">✓ دخول</button>`;
  setTimeout(()=>document.getElementById('pin-driver-name')?.focus(),100);
}

function _confirmDriver(){
  const name=document.getElementById('pin-driver-name')?.value.trim();
  if(!name){document.getElementById('pin-driver-name')?.style.setProperty('border-color','#F0997B');return;}
  SESSION={role:'driver',driverName:name};
  hidePinScreen();render();
}

function _renderPinEntry(role){
  _pinBuffer='';
  const sc=document.getElementById('pin-screen');
  sc.innerHTML=`
    <button onclick="_renderPinStep1()" style="position:absolute;top:20px;right:20px;background:none;border:none;font-size:22px;cursor:pointer;color:var(--tx2)">←</button>
    <div style="font-size:44px;margin-bottom:16px">🔐</div>
    <div class="pin-title">PIN محسين</div>
    <div class="pin-sub">أدخل الرمز السري</div>
    <div class="pin-dots" id="pd">
      <div class="pin-dot" id="pd0"></div>
      <div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div>
      <div class="pin-dot" id="pd3"></div>
    </div>
    <div id="pin-err" style="color:#D85A30;font-size:14px;font-weight:700;min-height:20px;margin-bottom:12px"></div>
    <div class="pin-numpad">
      ${[1,2,3,4,5,6,7,8,9,'','0','⌫'].map(n=>
        n===''?'<div></div>':`<button class="pin-num" onclick="_pinPress('${n}')">${n}</button>`
      ).join('')}
    </div>`;
  window._pinRole=role;
}

function _pinPress(k){
  if(k==='⌫'){
    _pinBuffer=_pinBuffer.slice(0,-1);
  }else if(_pinBuffer.length<4){
    _pinBuffer+=k;
  }
  // تحديث النقاط
  for(let i=0;i<4;i++){
    const d=document.getElementById('pd'+i);
    if(d)d.classList.toggle('filled',i<_pinBuffer.length);
  }
  if(_pinBuffer.length===4){
    setTimeout(()=>{
      if(_pinBuffer===CFG.managerPin){
        SESSION={role:'manager',driverName:''};
        hidePinScreen();render();
      }else{
        document.getElementById('pin-err').textContent='❌ رمز خاطئ — حاول مرة أخرى';
        _pinBuffer='';
        for(let i=0;i<4;i++){const d=document.getElementById('pd'+i);if(d)d.classList.remove('filled');}
      }
    },200);
  }
}

function switchRole(){showPinScreen();}

function openPinSetup(){
  const ov=document.createElement('div');ov.className='modal-overlay';ov.id='pm';ov.onclick=closeModal;
  let buf='';
  ov.innerHTML=`<div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-title">🔐 تعيين PIN محسين</div>
    <p style="font-size:14px;color:var(--tx2);margin-bottom:16px">سيُطلب هذا الرمز عند دخول محسين. الموزعون يدخلون بأسمائهم.</p>
    <div class="pin-dots" id="spd">
      <div class="pin-dot" id="spd0"></div><div class="pin-dot" id="spd1"></div>
      <div class="pin-dot" id="spd2"></div><div class="pin-dot" id="spd3"></div>
    </div>
    <div id="spin-err" style="color:#D85A30;font-size:14px;min-height:18px;text-align:center;margin-bottom:10px"></div>
    <div class="pin-numpad">
      ${[1,2,3,4,5,6,7,8,9,'','0','⌫'].map(n=>
        n===''?'<div></div>':`<button class="pin-num" onclick="_spPress('${n}')">${n}</button>`
      ).join('')}
    </div>
    <button class="btn btn-s" style="margin-top:14px" onclick="closeModal()">إلغاء</button>
  </div>`;
  document.body.appendChild(ov);
  window._spBuf='';
}
function _spPress(k){
  if(k==='⌫')window._spBuf=(window._spBuf||'').slice(0,-1);
  else if((window._spBuf||'').length<4)window._spBuf=(window._spBuf||'')+k;
  for(let i=0;i<4;i++){const d=document.getElementById('spd'+i);if(d)d.classList.toggle('filled',i<(window._spBuf||'').length);}
  if((window._spBuf||'').length===4){
    setTimeout(()=>{
      CFG.managerPin=window._spBuf;save();closeModal();
      toast('✅ تم تعيين PIN بنجاح');renderSettings();
    },200);
  }
}

injectManifest();
regSW();
loadLocal();
applyTheme();
if(!DF.time)DF.time=nstr();
// إظهار شاشة اختيار الدور فقط إذا تم تفعيل الميزة
if(CFG.managerPin&&CFG.managerPin.length>=4){
  showPinScreen();
}else{
  render();
}

// ═══════════════════════════════════════════════
//  VISUAL VIEWPORT — الزر يلتصق فوق لوحة المفاتيح
// ═══════════════════════════════════════════════
(function(){
  if(!window.visualViewport)return;

  function onViewportChange(){
    const btns=document.querySelectorAll('.sticky-submit');
    if(!btns.length)return;
    const vv=window.visualViewport;
    const winH=window.innerHeight;
    const navH=document.querySelector('.nav')?.offsetHeight||62;
    // الحساب الصحيح — بدون vv.offsetTop الذي يسبب مشاكل
    const kbHeight=Math.max(0,winH-vv.height);
    btns.forEach(btn=>{
      if(kbHeight>80){
        btn.style.bottom=kbHeight+'px';
      }else{
        btn.style.bottom=navH+'px';
      }
    });
  }

  window.visualViewport.addEventListener('resize',onViewportChange);
  window.visualViewport.addEventListener('scroll',onViewportChange);
})();
</script>
</body>
</html>
